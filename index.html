function LocationPicker({ onPick, onClose, onUseMyLocation }) {
  const [query, setQuery] = useState("");
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState(null);

  async function search() {
    if (!query.trim()) return;
    setLoading(true);
    setErr(null);
    try {
      const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=6`);
      const data = await res.json();
      setResults(data.results || []);
      if (!data.results || data.results.length === 0) setErr("No matches found.");
    } catch (e) {
      setErr("Search failed — check your connection.");
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="tb-overlay absolute inset-0 z-30 flex items-end" style={{ background: "rgba(10,16,19,0.65)" }} onClick={onClose}>
      <div className="tb-tray w-full rounded-t-2xl px-5 pt-4 pb-6" style={{ background: "var(--tb-bg)", border: "1px solid var(--tb-line)", maxHeight: "80%", overflowY: "auto" }} onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <h2 className="tb-stencil text-xl" style={{ color: "var(--tb-text)" }}>SET LOCATION</h2>
          <button onClick={onClose}><X size={20} style={{ color: "var(--tb-muted)" }} /></button>
        </div>

        {onUseMyLocation && (
          <button onClick={onUseMyLocation} className="w-full mb-3 py-2.5 rounded-lg text-sm font-semibold" style={{ background: "var(--tb-surface-2)", color: "var(--tb-text)" }}>
            Use my current location
          </button>
        )}

        <div className="flex gap-2 mb-3">
          <input
            value={query}
            onChange={(e) => setQuery(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && search()}
            placeholder="City, lake, or coastal town..."
            className="flex-1 rounded-lg py-2 px-3 text-sm outline-none"
            style={{ background: "var(--tb-surface-2)", color: "var(--tb-text)", border: "1px solid var(--tb-line)" }}
          />
          <button onClick={search} className="px-4 rounded-lg text-sm font-semibold" style={{ background: "var(--tb-brass)", color: "var(--tb-bg)" }}>
            Go
          </button>
        </div>

        {loading && <div className="tb-mono text-xs" style={{ color: "var(--tb-muted)" }}>Searching...</div>}
        {err && <div className="tb-mono text-xs" style={{ color: "var(--tb-flare)" }}>{err}</div>}

        <div className="space-y-2">
          {results.map((r, idx) => (
            <button
              key={idx}
              onClick={() => onPick({ name: [r.name, r.admin1, r.country_code].filter(Boolean).join(", "), lat: r.latitude, lon: r.longitude })}
              className="w-full text-left rounded-lg p-3"
              style={{ background: "var(--tb-surface)", border: "1px solid var(--tb-line)" }}
            >
              <div className="text-sm font-semibold" style={{ color: "var(--tb-text)" }}>{r.name}</div>
              <div className="tb-mono text-[11px]" style={{ color: "var(--tb-muted)" }}>{[r.admin1, r.country].filter(Boolean).join(", ")}</div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ---------------- Spots (personal catch stats + nearby waters) ---------------- */

function SpotsView({ catches }) {
  const [location, setLocation] = useState(null);
  const [locLoading, setLocLoading] = useState(true);
  const [showLocationPicker, setShowLocationPicker] = useState(false);

  const [nearby, setNearby] = useState(null);
  const [nearbyLoading, setNearbyLoading] = useState(false);
  const [nearbyError, setNearbyError] = useState(null);

  const [marinas, setMarinas] = useState(null);
  const [marinasLoading, setMarinasLoading] = useState(false);
  const [marinasError, setMarinasError] = useState(null);

  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get(LOCATION_KEY, false);
        if (res && res.value) setLocation(JSON.parse(res.value));
      } catch (e) {
        // no saved location yet
      }
      setLocLoading(false);
    })();
  }, []);

  const saveLocation = useCallback(async (loc) => {
    setLocation(loc);
    try {
      await window.storage.set(LOCATION_KEY, JSON.stringify(loc), false);
    } catch (e) {
      // ignore, just won't persist
    }
  }, []);

  const loadNearby = useCallback(async (lat, lon) => {
    setNearbyLoading(true);
    setNearbyError(null);
    try {
      const query = `[out:json][timeout:25];(node["leisure"="fishing"](around:24000,${lat},${lon});way["leisure"="fishing"](around:24000,${lat},${lon});way["natural"="water"](around:24000,${lat},${lon});way["waterway"="river"](around:24000,${lat},${lon}););out center 60;`;
      const res = await fetch("https://overpass-api.de/api/interpreter", {
        method: "POST",
        body: query,
      });
      if (!res.ok) throw new Error("overpass request failed");
      const data = await res.json();
      const seen = new Set();
      const spots = [];
      for (const el of data.elements || []) {
        const elLat = el.lat ?? el.center?.lat;
        const elLon = el.lon ?? el.center?.lon;
        const name = el.tags?.name;
        if (elLat == null || elLon == null || !name || seen.has(name)) continue;
        seen.add(name);
        const type = el.tags?.leisure === "fishing" ? "Fishing spot" : el.tags?.waterway === "river" ? "River" : "Lake / pond";
        spots.push({ name, type, lat: elLat, lon: elLon, distance: haversineMiles(lat, lon, elLat, elLon) });
      }
      spots.sort((a, b) => a.distance - b.distance);
      setNearby(spots.slice(0, 10));
    } catch (e) {
      setNearbyError("Couldn't reach map data right now — try again in a bit.");
    } finally {
      setNearbyLoading(false);
    }
  }, []);

  useEffect(() => {
    if (location) loadNearby(location.lat, location.lon);
  }, [location, loadNearby]);

  const loadMarinas = useCallback(async (lat, lon) => {
    setMarinasLoading(true);
    setMarinasError(null);
    try {
      const query = `[out:json][timeout:25];(node["leisure"="marina"](around:40000,${lat},${lon});way["leisure"="marina"](around:40000,${lat},${lon}););out center 20;`;
      const res = await fetch("https://overpass-api.de/api/interpreter", {
        method: "POST",
        body: query,
      });
      if (!res.ok) throw new Error("overpass request failed");
      const data = await res.json();
      const seen = new Set();
      const found = [];
      for (const el of data.elements || []) {
        const elLat = el.lat ?? el.center?.lat;
        const elLon = el.lon ?? el.center?.lon;
        const name = el.tags?.name;
        if (elLat == null || elLon == null || !name || seen.has(name)) continue;
        seen.add(name);
        found.push({ name, lat: elLat, lon: elLon, distance: haversineMiles(lat, lon, elLat, elLon) });
      }
      found.sort((a, b) => a.distance - b.distance);
      const nearest = found.slice(0, 6);

      // Fetch water temp for each nearby marina in parallel; missing data (common for
      // small/inland marinas) just shows as unavailable rather than failing the whole list.
      const withTemps = await Promise.all(
        nearest.map(async (m) => {
          try {
            const wres = await fetch(
              `https://marine-api.open-meteo.com/v1/marine?latitude=${m.lat}&longitude=${m.lon}&current=sea_surface_temperature&temperature_unit=fahrenheit&timezone=auto`
            );
            const wdata = await wres.json();
            const temp = wdata.current?.sea_surface_temperature;
            return { ...m, waterTemp: typeof temp === "number" ? temp : null };
          } catch (e) {
            return { ...m, waterTemp: null };
          }
        })
      );
      setMarinas(withTemps);
    } catch (e) {
      setMarinasError("Couldn't reach map data right now — try again in a bit.");
    } finally {
      setMarinasLoading(false);
    }
  }, []);

  useEffect(() => {
    if (location) loadMarinas(location.lat, location.lon);
  }, [location, loadMarinas]);

  function useMyLocation() {
    setLocLoading(true);
    if (!navigator.geolocation) {
      setLocLoading(false);
      setShowLocationPicker(true);
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        saveLocation({ name: "Current location", lat: pos.coords.latitude, lon: pos.coords.longitude });
        setLocLoading(false);
      },
      () => {
        setLocLoading(false);
        setShowLocationPicker(true);
      },
      { timeout: 8000 }
    );
  }

  const clusters = clusterCatchesByLocation(catches);

  if (locLoading) {
    return <div className="py-16 text-center" style={{ color: "var(--tb-muted)" }}>Loading spots...</div>;
  }

  return (
    <div className="space-y-3">
      <CardShell title="YOUR BEST SPOTS" subtitle="ranked from your GPS-tagged catches">
        {clusters.length === 0 ? (
          <EmptyState text="Log a few GPS-tagged catches and your top spots will show up here." />
        ) : (
          <div className="space-y-2">
            {clusters.slice(0, 5).map((cl, idx) => (
              <div key={idx} className="rounded-lg p-3" style={{ background: "var(--tb-surface-2)", border: "1px solid var(--tb-line)" }}>
                <div className="flex items-center justify-between gap-2">
                  <div className="text-sm font-semibold truncate" style={{ color: "var(--tb-text)" }}>
                    {cl.name || `Spot ${idx + 1}`}
                  </div>
                  <span className="tb-mono text-[10px] px-2 py-0.5 rounded-full shrink-0" style={{ background: "var(--tb-brass)", color: "var(--tb-bg)" }}>
                    {cl.count} catch{cl.count !== 1 ? "es" : ""}
                  </span>
                </div>
                <div className="tb-mono text-[11px] mt-1" style={{ color: "var(--tb-muted)" }}>
                  {[
                    `${cl.speciesCount} species`,
                    cl.bestWeightLb > 0 ? `best ${cl.bestWeightLb.toFixed(1)} lb` : null,
                    cl.topLure ? `${cl.topLure} working best` : null,
                  ].filter(Boolean).join(" · ")}
                </div>
                <a
                  href={`https://www.google.com/maps?q=${cl.lat},${cl.lon}`}
                  target="_blank"
                  rel="noopener noreferrer"
                  className="tb-mono text-[11px] mt-1.5 inline-flex items-center gap-1"
                  style={{ color: "var(--tb-blue)" }}
                >
                  <MapPin size={11} /> Open in Maps
                </a>
              </div>
            ))}
          </div>
        )}
      </CardShell>

      <CardShell title="NEARBY WATERS TO TRY" subtitle="pulled live from open map data">
        <div className="flex items-center justify-between mb-2">
          <button onClick={() => setShowLocationPicker(true)} className="flex items-center gap-1.5 text-xs tb-mono" style={{ color: "var(--tb-text)" }}>

function CommunityView() {
  const [sub, setSub] = useState("feed"); // feed | spots | leaderboard
  const [ready, setReady] = useState(!!(typeof window !== "undefined" && window.communityAPI && window.communityAPI.ready));
  const configured = typeof window !== "undefined" && window.communityAPI && window.communityAPI.configured;
  const [nickname, setNicknameState] = useState(() => (configured ? window.communityAPI.getNickname() : "Angler"));
  const [editingNickname, setEditingNickname] = useState(false);
  const [nicknameDraft, setNicknameDraft] = useState(nickname);

  useEffect(() => {
    if (!configured || ready) return;
    function onReady() {
      setReady(true);
      setNicknameState(window.communityAPI.getNickname());
    }
    window.addEventListener("community-ready", onReady);
    const t = setTimeout(() => {
      if (window.communityAPI && window.communityAPI.ready) onReady();
    }, 1500);
    return () => {
      window.removeEventListener("community-ready", onReady);
      clearTimeout(t);
    };
  }, [configured, ready]);

  function saveNickname() {
    const name = nicknameDraft.trim() || "Angler";
    window.communityAPI.setNickname(name);
    setNicknameState(name);
    setEditingNickname(false);
  }

  if (!configured) {
    return (
      <div className="py-10 text-center space-y-3">
        <Waves size={30} className="mx-auto" style={{ color: "var(--tb-brass)" }} />
        <p className="text-sm px-4" style={{ color: "var(--tb-muted)" }}>
          Community features need a one-time setup by whoever's hosting this app
          (a free Firebase project). Ask them to finish that step, then this tab
          will light up for everyone.
        </p>
      </div>
    );
  }

  if (!ready) {
    return <div className="py-16 text-center" style={{ color: "var(--tb-muted)" }}>Connecting to the community...</div>;
  }

  return (
    <div className="space-y-3">
      <div className="flex items-center justify-between">
        <div className="flex gap-2">
          <TabButton active={sub === "feed"} onClick={() => setSub("feed")} label="Feed" />
          <TabButton active={sub === "spots"} onClick={() => setSub("spots")} label="Spots" />
          <TabButton active={sub === "leaderboard"} onClick={() => setSub("leaderboard")} label="Ranks" />
        </div>
      </div>

      <CardShell title="YOUR ANGLER NAME">
        {editingNickname ? (
          <div className="flex gap-2">
            <input
              autoFocus
              value={nicknameDraft}
              onChange={(e) => setNicknameDraft(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && saveNickname()}
              className="flex-1 rounded-lg py-2 px-3 text-sm outline-none"
              style={{ background: "var(--tb-surface-2)", color: "var(--tb-text)", border: "1px solid var(--tb-line)" }}
            />
            <button onClick={saveNickname} className="px-3 rounded-lg text-xs tb-mono font-semibold" style={{ background: "var(--tb-brass)", color: "var(--tb-bg)" }}>Save</button>
          </div>
        ) : (
          <button onClick={() => { setNicknameDraft(nickname); setEditingNickname(true); }} className="flex items-center justify-between w-full">
            <span className="text-sm font-semibold" style={{ color: "var(--tb-text)" }}>{nickname}</span>
            <span className="tb-mono text-[11px]" style={{ color: "var(--tb-blue)" }}>Change</span>
          </button>
        )}
      </CardShell>

      {sub === "feed" && <CommunityFeed />}
      {sub === "spots" && <CommunitySpots />}
      {sub === "leaderboard" && <CommunityLeaderboard />}
    </div>
  );
}

function CommunityFeed() {
  const [catches, setCatches] = useState(null);
  const [error, setError] = useState(null);

  const load = useCallback(async () => {
    setError(null);
    try {
      const data = await window.communityAPI.listCatches(30);
      setCatches(data);
    } catch (e) {
      setError("Couldn't load the community feed right now.");
    }
  }, []);

  useEffect(() => { load(); }, [load]);

  async function handleDelete(id) {
    try {
      await window.communityAPI.deleteCatch(id);
      setCatches((prev) => prev.filter((c) => c.id !== id));
    } catch (e) {
      // ignore
    }
  }

  return (
    <CardShell title="RECENT CATCHES" subtitle="shared by everyone using this app">
      <div className="flex justify-end mb-2">
        <button onClick={load} className="w-7 h-7 rounded-md flex items-center justify-center" style={{ background: "var(--tb-surface-2)" }}>
          <RefreshCw size={13} style={{ color: "var(--tb-muted)" }} />
        </button>
      </div>
      {error && <div className="tb-mono text-xs" style={{ color: "var(--tb-flare)" }}>{error}</div>}
      {!error && catches === null && <div className="tb-mono text-xs" style={{ color: "var(--tb-muted)" }}>Loading feed...</div>}
      {!error && catches && catches.length === 0 && <EmptyState text="No shared catches yet — be the first from the Catches tab." />}
      {!error && catches && catches.length > 0 && (
        <div className="space-y-2">
          {catches.map((c) => {
            const dt = c.dateTime ? new Date(c.dateTime) : null;
            const mine = window.communityAPI.uid && c.uid === window.communityAPI.uid;
            return (
              <div key={c.id} className="rounded-lg p-3" style={{ background: "var(--tb-surface-2)", border: "1px solid var(--tb-line)" }}>
                <div className="flex items-center justify-between">
                  <span className="text-sm font-semibold" style={{ color: "var(--tb-text)" }}>{c.species || "Unknown species"}</span>
                  <span className="tb-mono text-[10px]" style={{ color: "var(--tb-brass)" }}>{c.nickname || "Angler"}</span>
                </div>
                <div className="tb-mono text-[11px] mt-0.5" style={{ color: "var(--tb-muted)" }}>
                  {[
                    c.length ? `${c.length} ${c.lengthUnit}` : null,
                    c.weight ? `${c.weight} ${c.weightUnit}` : null,
                    dt ? dt.toLocaleDateString([], { month: "short", day: "numeric" }) : null,
                  ].filter(Boolean).join(" · ")}
                </div>
                {(c.lure || c.location) && (
                  <div className="tb-mono text-[11px] mt-1" style={{ color: "var(--tb-blue)" }}>
                    {[c.lure, c.location].filter(Boolean).join(" · ")}
                  </div>
                )}
                {mine && (
                  <button onClick={() => handleDelete(c.id)} className="tb-mono text-[10px] mt-1.5" style={{ color: "var(--tb-flare)" }}>
                    Remove my post
                  </button>
                )}
              </div>
            );
          })}
        </div>
      )}
    </CardShell>
  );
}

function CommunitySpots() {
  const [spots, setSpots] = useState(null);
  const [error, setError] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [votedIds, setVotedIds] = useState({});

  const load = useCallback(async () => {
    setError(null);
    try {
      const data = await window.communityAPI.listSpots();
      setSpots(data);
    } catch (e) {
      setError("Couldn't load community spots right now.");
    }
  }, []);

  useEffect(() => { load(); }, [load]);

  async function vote(spotId) {
    if (votedIds[spotId]) return;
    setVotedIds((prev) => ({ ...prev, [spotId]: true }));
    try {
      await window.communityAPI.voteSpot(spotId);
      setSpots((prev) => prev.map((s) => (s.id === spotId ? { ...s, voteCount: (s.voteCount || 0) + 1 } : s)).sort((a, b) => (b.voteCount || 0) - (a.voteCount || 0)));
    } catch (e) {
      setVotedIds((prev) => ({ ...prev, [spotId]: false }));
    }
  }

  return (
    <>
      <CardShell title="CROWD-SOURCED SPOTS" subtitle="submitted and upvoted by the community">
        <div className="flex justify-between items-center mb-2">
          <button onClick={() => setShowForm(true)} className="text-xs tb-mono px-3 py-1.5 rounded-full" style={{ background: "var(--tb-brass)", color: "var(--tb-bg)" }}>
            + Add a spot
          </button>
          <button onClick={load} className="w-7 h-7 rounded-md flex items-center justify-center" style={{ background: "var(--tb-surface-2)" }}>
            <RefreshCw size={13} style={{ color: "var(--tb-muted)" }} />
          </button>
        </div>
        {error && <div className="tb-mono text-xs" style={{ color: "var(--tb-flare)" }}>{error}</div>}
        {!error && spots === null && <div className="tb-mono text-xs" style={{ color: "var(--tb-muted)" }}>Loading spots...</div>}
        {!error && spots && spots.length === 0 && <EmptyState text="No community spots yet — add the first one." />}
        {!error && spots && spots.length > 0 && (
          <div className="space-y-2">
            {spots.map((s) => (
              <div key={s.id} className="rounded-lg p-3" style={{ background: "var(--tb-surface-2)", border: "1px solid var(--tb-line)" }}>
                <div className="flex items-center justify-between gap-2">
                  <div className="min-w-0">
                    <div className="text-sm font-semibold truncate" style={{ color: "var(--tb-text)" }}>{s.name}</div>
                    <div className="tb-mono text-[10px] mt-0.5" style={{ color: "var(--tb-brass)" }}>added by {s.nickname || "Angler"}</div>
                  </div>
                  <button
                    onClick={() => vote(s.id)}
                    disabled={!!votedIds[s.id]}
                    className="flex flex-col items-center px-2 py-1 rounded-lg shrink-0"
                    style={{ background: votedIds[s.id] ? "var(--tb-brass)" : "var(--tb-surface)", color: votedIds[s.id] ? "var(--tb-bg)" : "var(--tb-text)" }}
                  >
                    <ArrowUp size={13} />
                    <span className="tb-mono text-[10px]">{s.voteCount || 0}</span>
                  </button>
                </div>
                {s.notes && <div className="text-xs mt-1.5" style={{ color: "var(--tb-muted)" }}>{s.notes}</div>}
                {typeof s.lat === "number" && (
                  <a
                    href={`https://www.google.com/maps?q=${s.lat},${s.lon}`}
                    target="_blank"
                    rel="noopener noreferrer"
                    className="tb-mono text-[11px] mt-1.5 inline-flex items-center gap-1"
                    style={{ color: "var(--tb-blue)" }}
                  >
                    <MapPin size={11} /> Open in Maps
                  </a>
                )}
              </div>
            ))}
          </div>
        )}
      </CardShell>

      {showForm && <AddSpotForm onCancel={() => setShowForm(false)} onSaved={() => { setShowForm(false); load(); }} />}
    </>
  );
}

function AddSpotForm({ onCancel, onSaved }) {
  const [name, setName] = useState("");
  const [notes, setNotes] = useState("");
  const [gps, setGps] = useState(null);
  const [gpsStatus, setGpsStatus] = useState("idle");
  const [saving, setSaving] = useState(false);

  const captureGps = useCallback(() => {
    if (!navigator.geolocation) {
      setGpsStatus("error");
      return;
    }
    setGpsStatus("locating");
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        setGps({ lat: pos.coords.latitude, lon: pos.coords.longitude });
        setGpsStatus("ok");
      },
      () => setGpsStatus("error"),
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }, []);

  useEffect(() => { captureGps(); }, [captureGps]);

  async function submit() {
    if (!name.trim() || saving) return;
    setSaving(true);
    try {
      await window.communityAPI.addSpot({
        name: name.trim(),
        notes: notes.trim(),
        lat: gps ? gps.lat : null,
        lon: gps ? gps.lon : null,
      });
      onSaved();
    } catch (e) {
      setSaving(false);
    }
  }

  const inputStyle = { background: "var(--tb-surface-2)", color: "var(--tb-text)", border: "1px solid var(--tb-line)" };

  return (
    <div className="tb-overlay absolute inset-0 z-30" style={{ background: "rgba(10,16,19,0.65)" }}>
      <div className="tb-tray absolute bottom-0 left-0 right-0 rounded-t-2xl px-5 pt-4 pb-6" style={{ background: "var(--tb-bg)", border: "1px solid var(--tb-line)", maxHeight: "80%", overflowY: "auto" }}>
        <div className="flex items-center justify-between mb-4">
          <h2 className="tb-stencil text-xl" style={{ color: "var(--tb-text)" }}>ADD A SPOT</h2>
          <button onClick={onCancel}><X size={20} style={{ color: "var(--tb-muted)" }} /></button>
        </div>
        <div className="space-y-3">
          <Field label="Spot name">
            <input autoFocus value={name} onChange={(e) => setName(e.target.value)} placeholder="e.g. North Cove boat ramp" className="w-full rounded-lg py-2 px-3 text-sm outline-none" style={inputStyle} />
          </Field>
          <Field label="Notes (optional)">
            <textarea value={notes} onChange={(e) => setNotes(e.target.value)} rows={2} placeholder="What's good here, access tips, etc." className="w-full rounded-lg py-2 px-3 text-sm outline-none resize-none" style={inputStyle} />
          </Field>
          <Field label="Location">
            {gpsStatus === "locating" && (
              <div className="flex items-center gap-2 text-xs tb-mono rounded-lg py-2 px-3" style={inputStyle}>
                <RefreshCw size={13} className="tb-spin" style={{ color: "var(--tb-muted)" }} />
                <span style={{ color: "var(--tb-muted)" }}>Finding your location...</span>
              </div>
            )}
            {gpsStatus === "ok" && gps && (
              <div className="text-xs tb-mono rounded-lg py-2 px-3" style={inputStyle}>
                <span style={{ color: "var(--tb-text)" }}>{gps.lat.toFixed(4)}, {gps.lon.toFixed(4)}</span>
              </div>
            )}
            {gpsStatus === "error" && (
              <div className="flex items-center justify-between text-xs tb-mono rounded-lg py-2 px-3" style={inputStyle}>
                <span style={{ color: "var(--tb-muted)" }}>No location — spot will save without a pin.</span>
                <button type="button" onClick={captureGps} style={{ color: "var(--tb-brass)" }}>Try again</button>
              </div>
            )}
          </Field>
        </div>
        <div className="flex gap-3 mt-5">
          <button onClick={onCancel} className="flex-1 py-2.5 rounded-lg text-sm font-semibold" style={{ background: "var(--tb-surface-2)", color: "var(--tb-text)" }}>Cancel</button>
          <button onClick={submit} disabled={!name.trim() || saving} className="flex-1 py-2.5 rounded-lg text-sm font-semibold" style={{ background: name.trim() ? "var(--tb-brass)" : "var(--tb-surface-2)", color: name.trim() ? "var(--tb-bg)" : "var(--tb-muted)" }}>
            {saving ? "Saving..." : "Add spot"}
          </button>
        </div>
      </div>
    </div>
  );
}

  const filtered = category === "all" ? KNOTS : KNOTS.filter((k) => k.category === category);

  function toggle(id) {

/* ---------------- Settings (license & limits, backup/restore) ---------------- */

async function exportAllData() {
  const data = { version: 1, exportedAt: new Date().toISOString() };
  try {
    const r = await window.storage.get(STORAGE_KEY, false);
    data.items = r && r.value ? JSON.parse(r.value) : [];
  } catch (e) {
    data.items = [];
  }
  try {
    const r = await window.storage.get(CATCH_KEY, false);
    data.catches = r && r.value ? JSON.parse(r.value) : [];
  } catch (e) {
    data.catches = [];
  }
  try {
    const r = await window.storage.get(LOCATION_KEY, false);
    data.location = r && r.value ? JSON.parse(r.value) : null;
  } catch (e) {
    data.location = null;
  }
  try {
    const r = await window.storage.get(LICENSE_KEY, false);
    data.license = r && r.value ? JSON.parse(r.value) : null;
  } catch (e) {
    data.license = null;
  }
  data.nickname = (typeof window !== "undefined" && window.communityAPI && window.communityAPI.getNickname)
    ? window.communityAPI.getNickname()
    : null;

  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `epic-fishy-backup-${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function importAllData(file) {
  const text = await file.text();
  const data = JSON.parse(text);
  if (Array.isArray(data.items)) await window.storage.set(STORAGE_KEY, JSON.stringify(data.items), false);
  if (Array.isArray(data.catches)) await window.storage.set(CATCH_KEY, JSON.stringify(data.catches), false);
  if (data.location) await window.storage.set(LOCATION_KEY, JSON.stringify(data.location), false);
  if (data.license) await window.storage.set(LICENSE_KEY, JSON.stringify(data.license), false);
  if (data.nickname && typeof window !== "undefined" && window.communityAPI && window.communityAPI.setNickname) {
    window.communityAPI.setNickname(data.nickname);
  }
}

function SettingsPanel({ onClose }) {
  const [loading, setLoading] = useState(true);
  const [expiry, setExpiry] = useState("");
  const [notes, setNotes] = useState("");
  const [saved, setSaved] = useState(false);
  const [importing, setImporting] = useState(false);
  const [importMsg, setImportMsg] = useState(null);
  const fileInputRef = useRef(null);

  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get(LICENSE_KEY, false);
        if (r && r.value) {
          const parsed = JSON.parse(r.value);
          setExpiry(parsed.expiry ? parsed.expiry.slice(0, 10) : "");
          setNotes(parsed.notes || "");
        }
      } catch (e) {
        // no saved license info yet
      }
      setLoading(false);
    })();
  }, []);

  async function saveLicense() {
    const data = { expiry: expiry ? new Date(expiry).toISOString() : null, notes: notes.trim() };
    try {
      await window.storage.set(LICENSE_KEY, JSON.stringify(data), false);
      setSaved(true);
      setTimeout(() => setSaved(false), 1500);
    } catch (e) {
      // ignore
    }
  }

  const daysUntilExpiry = expiry ? Math.ceil((new Date(expiry) - new Date()) / 86400000) : null;

  async function handleImportFile(e) {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    setImporting(true);
    setImportMsg(null);
    try {
      await importAllData(file);
      setImportMsg("Import complete — reloading...");
      setTimeout(() => window.location.reload(), 1200);
    } catch (err) {
      setImportMsg("Couldn't read that file — make sure it's an Epic Fishy backup.");
      setImporting(false);
    }
  }

  const inputStyle = { background: "var(--tb-surface-2)", color: "var(--tb-text)", border: "1px solid var(--tb-line)" };

  return (
    <div className="tb-overlay absolute inset-0 z-40" style={{ background: "rgba(10,16,19,0.7)" }} onClick={onClose}>
      <div
        className="tb-tray absolute bottom-0 left-0 right-0 rounded-t-2xl px-5 pt-4 pb-6"
        style={{ background: "var(--tb-bg)", border: "1px solid var(--tb-line)", maxHeight: "85%", overflowY: "auto" }}
        onClick={(e) => e.stopPropagation()}
      >
        <div className="flex items-center justify-between mb-4">
          <h2 className="tb-stencil text-xl" style={{ color: "var(--tb-text)" }}>SETTINGS</h2>
          <button onClick={onClose}><X size={20} style={{ color: "var(--tb-muted)" }} /></button>
        </div>

        <CardShell title="LICENSE & LIMITS">
          {loading ? (
            <div className="tb-mono text-xs" style={{ color: "var(--tb-muted)" }}>Loading...</div>
          ) : (
            <div className="space-y-3">
              <Field label="License expiration date">
                <input type="date" value={expiry} onChange={(e) => setExpiry(e.target.value)} className="w-full rounded-lg py-2 px-3 text-sm outline-none" style={inputStyle} />
              </Field>
              {daysUntilExpiry !== null && (
                <div className="tb-mono text-xs" style={{ color: daysUntilExpiry <= 14 ? "var(--tb-flare)" : "var(--tb-muted)" }}>
                  {daysUntilExpiry < 0
                    ? "Your license has expired."
                    : daysUntilExpiry === 0
                    ? "Expires today!"
                    : `Expires in ${daysUntilExpiry} day${daysUntilExpiry !== 1 ? "s" : ""}.`}
                </div>
              )}
              <Field label="Size & bag limits, notes">
                <textarea
                  value={notes}
                  onChange={(e) => setNotes(e.target.value)}
                  rows={3}
                  placeholder="e.g. Largemouth bass: 5/day, 12in minimum at Clear Lake"
                  className="w-full rounded-lg py-2 px-3 text-sm outline-none resize-none"
                  style={inputStyle}
                />
              </Field>
              <button onClick={saveLicense} className="w-full py-2 rounded-lg text-xs tb-mono font-semibold" style={{ background: "var(--tb-brass)", color: "var(--tb-bg)" }}>
                {saved ? "Saved ✓" : "Save"}
              </button>
            </div>
          )}
        </CardShell>

        <div className="h-3" />

        <CardShell title="YOUR DATA">
          <div className="space-y-2">
            <button onClick={exportAllData} className="w-full py-2.5 rounded-lg text-xs tb-mono font-semibold" style={inputStyle}>
              Export a backup file
            </button>
            <input ref={fileInputRef} type="file" accept="application/json" onChange={handleImportFile} className="hidden" />
            <button
              onClick={() => fileInputRef.current && fileInputRef.current.click()}
              disabled={importing}
              className="w-full py-2.5 rounded-lg text-xs tb-mono font-semibold"
              style={inputStyle}
            >
              {importing ? "Importing..." : "Import a backup file"}
            </button>
            {importMsg && <div className="tb-mono text-[11px]" style={{ color: "var(--tb-muted)" }}>{importMsg}</div>}
            <p className="tb-mono text-[10px]" style={{ color: "var(--tb-muted)" }}>
              Importing replaces your current tackle box, catches, and location with the backup's contents.
              Worth doing this occasionally — everything lives only on this device otherwise.
            </p>
          </div>
        </CardShell>
      </div>
    </div>
  );
}

          <path d="M20 53 q5 -6 10 0 t10 0" style={{ stroke: blue }} strokeWidth="2.5" fill="none" strokeLinecap="round" />
        </svg>
      );
    case "drop-shot":
      return (
        <svg {...size}>
          <line x1="32" y1="4" x2="32" y2="54" style={{ stroke: blue }} strokeWidth="2" />
          <path d="M32 22 L46 22 q6 2 3 9" style={{ stroke: brass }} strokeWidth="2.5" fill="none" strokeLinecap="round" />
          <circle cx="32" cy="54" r="4" style={{ fill: brass }} />
        </svg>
      );
    case "wacky-rig":
      return (
        <svg {...size}>
          <path d="M8 32 q11 -11 22 0 t22 0" style={{ stroke: blue }} strokeWidth="5" fill="none" strokeLinecap="round" />
          <path d="M32 19 L32 45" style={{ stroke: brass }} strokeWidth="2.5" />
          <circle cx="32" cy="17" r="3" style={{ fill: brass }} />
        </svg>
      );
    default:
      return null;
  }
}

function TackleGuideView() {
  const [category, setCategory] = useState("all");
  const [expanded, setExpanded] = useState({});

  const filtered = category === "all" ? TACKLE_REFERENCE : TACKLE_REFERENCE.filter((t) => t.category === category);

  function toggle(id) {
    setExpanded((prev) => ({ ...prev, [id]: !prev[id] }));
  }

  return (
    <div className="space-y-3">
      <p className="tb-mono text-[11px] px-1" style={{ color: "var(--tb-muted)" }}>
        Original diagrams to help identify what's in your box — tap any one for details.
      </p>
      <div className="flex gap-2 overflow-x-auto tb-scroll" style={{ scrollbarWidth: "none" }}>
        {TACKLE_REF_CATEGORIES.map((c) => (
          <TabButton key={c.id} active={category === c.id} onClick={() => setCategory(c.id)} label={c.label} />
        ))}
      </div>

      <div className="grid grid-cols-2 gap-2">
        {filtered.map((t) => {
          const isOpen = !!expanded[t.id];
          return (
            <button
              key={t.id}
              onClick={() => toggle(t.id)}
              className="rounded-xl p-3 text-left"
              style={{ background: "var(--tb-surface)", border: "1px solid var(--tb-line)", gridColumn: isOpen ? "1 / -1" : undefined }}
            >
              <div className="flex items-center gap-3">
                <div className="w-11 h-11 rounded-lg flex items-center justify-center shrink-0" style={{ background: "var(--tb-surface-2)" }}>
                  <TackleRefIcon type={t.id} />
                </div>
                <span className="text-sm font-semibold" style={{ color: "var(--tb-text)" }}>{t.name}</span>
              </div>
              {isOpen && (
                <p className="text-xs leading-relaxed mt-2" style={{ color: "var(--tb-muted)" }}>{t.desc}</p>
              )}
            </button>
          );
        })}
      </div>
    </div>
  );
}


const root = createRoot(document.getElementById("root"));
root.render(<TackleTracker />);
window.__tackleAppMounted = true;

</script>
</body>
</html>
