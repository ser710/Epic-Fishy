    window.storage = {
      async get(key, shared) {
        const k = (shared ? "shared:" : "personal:") + key;
        const raw = localStorage.getItem(k);
        if (raw === null) throw new Error("key not found");
        return { key, value: raw, shared: !!shared };
      },
      async set(key, value, shared) {
        const k = (shared ? "shared:" : "personal:") + key;
        localStorage.setItem(k, value);
        return { key, value, shared: !!shared };
      },
      async delete(key, shared) {
        const k = (shared ? "shared:" : "personal:") + key;
        localStorage.removeItem(k);
        return { key, deleted: true, shared: !!shared };
      },
      async list(prefix, shared) {
        const tag = shared ? "shared:" : "personal:";
        const pfx = tag + (prefix || "");
        const keys = Object.keys(localStorage)
          .filter((k) => k.startsWith(pfx))
          .map((k) => k.slice(tag.length));
        return { keys, prefix, shared: !!shared };
      },
    };

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }

    // Watchdog: if the app hasn't mounted within 9s, show a clear message
    // instead of leaving the screen blank so problems are easy to diagnose.
    window.__tackleAppMounted = false;
    window.addEventListener("error", function (e) {
      showLoadError("A script failed to load or run (" + (e.message || "unknown error") + ").");
    });
    setTimeout(function () {
      if (!window.__tackleAppMounted) {
        showLoadError("The app is taking too long to start. This usually means a required script " +
          "(React, icons, or the code translator) couldn't load.");
      }
    }, 9000);

    function showLoadError(detail) {
      if (window.__tackleAppMounted) return;
      var root = document.getElementById("root");

function weightToLb(value, unit) {
  const v = Number(value) || 0;
  return unit === "kg" ? v * 2.20462 : v;
}

function lengthToIn(value, unit) {
  const v = Number(value) || 0;
  return unit === "cm" ? v / 2.54 : v;
}

function uid() {
  return Math.random().toString(36).slice(2, 10);
}

function compressImage(file, maxDim = 640, quality = 0.62) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) {
          height = Math.round(height * (maxDim / width));
          width = maxDim;
        } else if (height >= width && height > maxDim) {
          width = Math.round(width * (maxDim / height));
          height = maxDim;
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = () => reject(new Error("Couldn't read that image"));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error("Couldn't read that file"));
    reader.readAsDataURL(file);
  });
}

function haversineMiles(lat1, lon1, lat2, lon2) {
  const R = 3958.8;
  const dLat = ((lat2 - lat1) * Math.PI) / 180;
  const dLon = ((lon2 - lon1) * Math.PI) / 180;
  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos((lat1 * Math.PI) / 180) *
      Math.cos((lat2 * Math.PI) / 180) *
      Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function weatherCodeInfo(code) {
  if (code === 0) return { label: "Clear", Icon: Sun };
  if ([1, 2].includes(code)) return { label: "Partly cloudy", Icon: Sun };
  if (code === 3) return { label: "Overcast", Icon: Cloud };
  if ([45, 48].includes(code)) return { label: "Foggy", Icon: CloudFog };
  if ([51, 53, 55, 56, 57, 61, 63, 65, 66, 67, 80, 81, 82].includes(code))
    return { label: "Rain", Icon: CloudRain };
  if ([71, 73, 75, 77, 85, 86].includes(code))
    return { label: "Snow", Icon: CloudSnow };
  if ([95, 96, 99].includes(code))
    return { label: "Thunderstorms", Icon: CloudLightning };
  return { label: "Mixed", Icon: Cloud };
}

function compassDir(deg) {
  const dirs = ["N", "NNE", "NE", "ENE", "E", "ESE", "SE", "SSE", "S", "SSW", "SW", "WSW", "W", "WNW", "NW", "NNW"];
  return dirs[Math.round(deg / 22.5) % 16];
}

function capitalize(s) {
  return s.charAt(0).toUpperCase() + s.slice(1);
}

function getPressureTrend(weather) {
  try {
    const times = weather.hourly.time;
    const pressures = weather.hourly.pressure_msl;
    const nowIdx = times.findIndex((t) => t === weather.current.time?.slice(0, 13) + ":00");
    const refIdx = nowIdx >= 3 ? nowIdx - 3 : 0;
    if (nowIdx < 0) return null;
    const diff = pressures[nowIdx] - pressures[refIdx];
    return diff > 0.8 ? "rising" : diff < -0.8 ? "falling" : "steady";
  } catch (e) {
    return null;
  }
}

// --- Solunar estimate: moon phase + approximate major/minor feeding windows ---
// Moonrise/transit calculations are approximated (not full astronomical
// precision) using the moon's age relative to the local solar noon, which is
// the standard simplification hobby solunar calculators use.
function getMoonPhase(date) {
  const synodicMonth = 29.530588853;
  const knownNewMoon = Date.UTC(2000, 0, 6, 18, 14); // a known new moon reference point
  const daysSince = (date.getTime() - knownNewMoon) / 86400000;
  const age = daysSince % synodicMonth;
  const ageNorm = age < 0 ? age + synodicMonth : age;
  const illumination = Math.round((1 - Math.cos((2 * Math.PI * ageNorm) / synodicMonth)) * 50);

  let name, emoji;
  if (ageNorm < 1.5 || ageNorm > synodicMonth - 1.5) { name = "New Moon"; emoji = "🌑"; }
  else if (ageNorm < 6.4) { name = "Waxing Crescent"; emoji = "🌒"; }
  else if (ageNorm < 8.4) { name = "First Quarter"; emoji = "🌓"; }
  else if (ageNorm < 13.3) { name = "Waxing Gibbous"; emoji = "🌔"; }
  else if (ageNorm < 16.3) { name = "Full Moon"; emoji = "🌕"; }
  else if (ageNorm < 21.2) { name = "Waning Gibbous"; emoji = "🌖"; }
  else if (ageNorm < 23.2) { name = "Last Quarter"; emoji = "🌗"; }
  else { name = "Waning Crescent"; emoji = "🌘"; }

  return { ageDays: ageNorm, illumination, name, emoji };
}

function getSolunarPeriods(sunriseIso, sunsetIso, moonAgeDays) {
  if (!sunriseIso || !sunsetIso) return null;
  const sunrise = new Date(sunriseIso);
  const sunset = new Date(sunsetIso);
  const solarNoon = new Date((sunrise.getTime() + sunset.getTime()) / 2);

  // Moon transit drifts ~50.5 minutes later each day relative to the sun, starting near solar noon at new moon.
  const driftMs = moonAgeDays * 50.5 * 60000;
  const moonTransit = new Date(solarNoon.getTime() + driftMs);

  const H = 3600000;
  const major1 = { start: new Date(moonTransit - H), end: new Date(moonTransit.getTime() + H) };
  const major2Center = new Date(moonTransit.getTime() + 12.42 * H);
  const major2 = { start: new Date(major2Center.getTime() - H), end: new Date(major2Center.getTime() + H) };
  const minor1Center = new Date(moonTransit.getTime() - 6.2 * H);
  const minor1 = { start: new Date(minor1Center.getTime() - 0.5 * H), end: new Date(minor1Center.getTime() + 0.5 * H) };
  const minor2Center = new Date(moonTransit.getTime() + 6.2 * H);
  const minor2 = { start: new Date(minor2Center.getTime() - 0.5 * H), end: new Date(minor2Center.getTime() + 0.5 * H) };

  return { majors: [major1, major2], minors: [minor1, minor2] };
}

function itemMatchesKeywords(item, keywords) {
  const hay = `${item.name} ${item.spec} ${item.notes || ""}`.toLowerCase();
  return keywords.some((k) => hay.includes(k.toLowerCase()));
}

function buildRecommendations(weather, tide) {
  const recs = [];
  const cur = weather?.current;
  if (!cur) return recs;

  const now = new Date();
  const sunrise = weather.daily?.sunrise?.[0] ? new Date(weather.daily.sunrise[0]) : null;
  const sunset = weather.daily?.sunset?.[0] ? new Date(weather.daily.sunset[0]) : null;
  const minutesFrom = (d) => (d ? Math.abs(now - d) / 60000 : Infinity);
  const nearSunrise = minutesFrom(sunrise) < 60;
  const nearSunset = minutesFrom(sunset) < 60;
  const trend = getPressureTrend(weather);
  const cloud = cur.cloud_cover ?? 50;
  const wind = cur.wind_speed_10m ?? 0;
  const temp = cur.temperature_2m;
  const skyLabel = weatherCodeInfo(cur.weather_code).label;

  if ((nearSunrise || nearSunset) && wind < 14) {
    recs.push({
      title: "Low-light topwater window",
      reason: `${nearSunrise ? "Sunrise" : "Sunset"} plus calm wind (${Math.round(wind)} mph) — fish push shallow to feed on top.`,
      keywords: ["topwater", "popper", "walking bait", "buzzbait", "frog"],
    });
  }

  if (trend === "falling") {
    recs.push({
      title: "Reaction baits before the front",
      reason: "Falling pressure usually fires fish up before a system moves in — moving baits get eaten.",
      keywords: ["spinnerbait", "chatterbait", "crankbait", "swim jig", "lipless"],
    });
  } else if (trend === "rising") {
    recs.push({
      title: "Slow down and downsize",
      reason: "Rising pressure after a front puts fish in a tight, finicky mood — go smaller and slower.",
      keywords: ["ned rig", "drop shot", "finesse", "jig", "soft plastic", "worm"],
    });
  }

  if (cloud > 60 || skyLabel === "Rain" || skyLabel === "Thunderstorms") {
    recs.push({
      title: "Overcast: let them roam",
      reason: "Low light lets fish move off cover to chase — moving baits and darker colors shine.",
      keywords: ["spinnerbait", "chatterbait", "swim jig", "crankbait"],
    });
  } else if (cloud < 25) {
    recs.push({
      title: "Bright and clear: go natural",
      reason: "Bluebird skies push fish tight to cover or deeper — natural colors and subtler baits work better.",
      keywords: ["finesse", "shad", "natural", "soft plastic", "drop shot"],
    });
  }

  if (wind > 15) {
    recs.push({
      title: "Wind-driven feed",
      reason: `${Math.round(wind)} mph wind stirs up baitfish — search baits cover water fast.`,
      keywords: ["crankbait", "spinnerbait", "swimbait"],
    });
  }

  if (typeof temp === "number" && temp < 50) {
    recs.push({
      title: "Cold water, slow it down",
      reason: "Below 50°F fish metabolism slows way down — a slow, subtle presentation gets more bites.",
      keywords: ["jig", "soft plastic", "ned rig", "finesse"],
    });
  } else if (typeof temp === "number" && temp > 82) {
    recs.push({
      title: "Beat the heat",
      reason: "In the heat, target shade and deeper structure through midday — save reaction baits for the edges of the day.",
      keywords: ["deep diving", "jig", "texas rig", "carolina rig"],
    });
  }

  if (tide && tide.predictions && tide.predictions.length >= 1) {
    const sorted = tide.predictions
      .map((p) => ({ ...p, time: new Date(p.t.replace(" ", "T")) }))
      .sort((a, b) => a.time - b.time);
    const next = sorted.find((p) => p.time > now);
    if (next) {
      const rising = next.type === "H";
      recs.push({
        title: rising ? "Incoming tide" : "Outgoing tide",
        reason: rising
          ? "Rising water pulls baitfish onto flats and structure — game fish follow them in."
          : "Falling water pulls bait off structure into channels — target the edges and drop-offs.",
        keywords: ["swimbait", "jig", "soft plastic", "topwater"],
      });
    }
  }

  // de-dupe by title, keep first 4
  const seen = new Set();
  return recs.filter((r) => (seen.has(r.title) ? false : (seen.add(r.title), true))).slice(0, 4);
}

function clusterCatchesByLocation(catches) {
  const tagged = catches.filter((c) => c.gps && typeof c.gps.lat === "number");
  const clusters = [];

  for (const c of tagged) {
    let cluster = clusters.find((cl) => haversineMiles(cl.lat, cl.lon, c.gps.lat, c.gps.lon) < 0.6);
    if (!cluster) {
      cluster = { lat: c.gps.lat, lon: c.gps.lon, items: [] };
      clusters.push(cluster);
    }
    cluster.items.push(c);
    cluster.lat = cluster.items.reduce((s, x) => s + x.gps.lat, 0) / cluster.items.length;
    cluster.lon = cluster.items.reduce((s, x) => s + x.gps.lon, 0) / cluster.items.length;
  }

  return clusters
    .map((cl) => {
      const species = [...new Set(cl.items.map((c) => c.species).filter(Boolean))];
      const lureCounts = {};
      cl.items.forEach((c) => {
        if (c.lure) lureCounts[c.lure] = (lureCounts[c.lure] || 0) + 1;
      });
      const topLure = Object.entries(lureCounts).sort((a, b) => b[1] - a[1])[0];
      const bestWeightLb = cl.items.reduce((best, c) => Math.max(best, weightToLb(c.weight, c.weightUnit)), 0);
      const lastDate = cl.items.reduce((latest, c) => (!latest || new Date(c.dateTime) > new Date(latest) ? c.dateTime : latest), null);
      const namedLocation = cl.items.find((c) => c.location)?.location || null;
      return {
        lat: cl.lat,
        lon: cl.lon,
        count: cl.items.length,
        speciesCount: species.length,
        species,
        topLure: topLure ? topLure[0] : null,
        bestWeightLb,
        lastDate,
        name: namedLocation,
      };
    })
    .sort((a, b) => b.count - a.count);
}

export default function TackleTracker() {
  const [view, setView] = useState("tackle"); // 'tackle' | 'conditions' | 'catches'
  const [items, setItems] = useState(null);
  const [activeCategory, setActiveCategory] = useState(null);
  const [search, setSearch] = useState("");
  const [showForm, setShowForm] = useState(false);
  const [editingItem, setEditingItem] = useState(null);
  const [formPrefill, setFormPrefill] = useState(null);
  const [tackleSubView, setTackleSubView] = useState("gear"); // 'gear' | 'guide'
  const [showSettings, setShowSettings] = useState(false);
  const [saveError, setSaveError] = useState(false);
  const [toast, setToast] = useState(null);
  const toastTimer = useRef(null);
  const touchStart = useRef(null);

  function handleTouchStart(e) {
    const overlayOpen = showForm || showCatchForm || showSettings || activeCategory;
    if (overlayOpen) {
      touchStart.current = null;
      return;
    }
    const t = e.touches[0];
    touchStart.current = { x: t.clientX, y: t.clientY };
  }

  function handleTouchEnd(e) {
    if (!touchStart.current) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.current.x;
    const dy = t.clientY - touchStart.current.y;
    touchStart.current = null;

    // Mostly-horizontal, deliberate swipes only — ignore scrolls and taps.
    if (Math.abs(dx) < 60 || Math.abs(dx) < Math.abs(dy) * 1.5) return;

    const idx = MAIN_VIEWS.indexOf(view);
    if (idx === -1) return;
    if (dx < 0 && idx < MAIN_VIEWS.length - 1) {
      setView(MAIN_VIEWS[idx + 1]);
    } else if (dx > 0 && idx > 0) {
      setView(MAIN_VIEWS[idx - 1]);
    }
  }

  const [catches, setCatches] = useState(null);
  const [showCatchForm, setShowCatchForm] = useState(false);
  const [editingCatch, setEditingCatch] = useState(null);

  function openQuickAdd(name, category) {
    setEditingItem(null);
    setFormPrefill({ name: capitalize(name), category: category || "lures" });
    setView("tackle");
    setShowForm(true);
  }

  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get(STORAGE_KEY, false);
        setItems(res && res.value ? JSON.parse(res.value) : []);
      } catch (e) {
        setItems([]);
      }
    })();
    (async () => {
      try {
        const res = await window.storage.get(CATCH_KEY, false);
        setCatches(res && res.value ? JSON.parse(res.value) : []);
      } catch (e) {
        setCatches([]);
      }
    })();
  }, []);

  useEffect(() => {
    if (items === null) return;
    (async () => {
      try {
        const res = await window.storage.set(STORAGE_KEY, JSON.stringify(items), false);
        setSaveError(!res);
      } catch (e) {
        setSaveError(true);
      }
    })();
  }, [items]);

  useEffect(() => {
    if (catches === null) return;
    (async () => {
      try {
        const res = await window.storage.set(CATCH_KEY, JSON.stringify(catches), false);
        setSaveError((prev) => (res ? prev : true));
      } catch (e) {
        setSaveError(true);
      }
    })();
  }, [catches]);

  function showToast(msg) {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 1800);
  }

  function upsertItem(item) {
    setItems((prev) => {
      const exists = prev.some((i) => i.id === item.id);
      if (exists) return prev.map((i) => (i.id === item.id ? item : i));
      return [...prev, item];
    });
    showToast(editingItem ? "Item updated" : "Item added to tackle box");
    setShowForm(false);
    setEditingItem(null);
    setFormPrefill(null);
  }

  function upsertCatch(record) {
    setCatches((prev) => {
      const exists = prev.some((c) => c.id === record.id);
      if (exists) return prev.map((c) => (c.id === record.id ? record : c));
      return [record, ...prev];
    });
    showToast(editingCatch ? "Catch updated" : "Catch logged");
    setShowCatchForm(false);
    setEditingCatch(null);
  }

  function deleteCatch(id) {
    setCatches((prev) => prev.filter((c) => c.id !== id));
    showToast("Catch removed");
  }

  function deleteItem(id) {
    setItems((prev) => prev.filter((i) => i.id !== id));
    showToast("Item removed");
  }

  function adjustQty(id, delta) {
    setItems((prev) =>
      prev.map((i) => (i.id === id ? { ...i, quantity: Math.max(0, i.quantity + delta) } : i))
    );
  }

  const loading = items === null;
  const counts = {};
  const lowCounts = {};
  if (!loading) {
    for (const c of CATEGORIES) {
      counts[c.id] = items.filter((i) => i.category === c.id).length;
      lowCounts[c.id] = items.filter(
        (i) => i.category === c.id && i.quantity <= (i.lowThreshold ?? 2)
      ).length;
    }
  }

  const filteredSearch =
    !loading && search.trim()
      ? items.filter(
          (i) =>
            i.name.toLowerCase().includes(search.toLowerCase()) ||
            (i.spec || "").toLowerCase().includes(search.toLowerCase()) ||
            (i.location || "").toLowerCase().includes(search.toLowerCase())
        )
      : null;

  const activeItems =
    !loading && activeCategory ? items.filter((i) => i.category === activeCategory) : [];

  return (
    <div
      style={{ fontFamily: "'Inter', sans-serif", background: "var(--tb-bg)", minHeight: "640px" }}
      className="w-full max-w-md mx-auto relative overflow-hidden rounded-2xl"
    >
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Stencil:wght@600;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

        .tb-toast { animation: tb-fade-in 0.15s ease; }
        .tb-spin { animation: tb-spin 1s linear infinite; }
      `}</style>

      {/* Header */}
      <div
        className="px-5 pt-6 pb-3 relative"
        style={{ background: "linear-gradient(180deg, var(--tb-surface) 0%, var(--tb-bg) 100%)", borderBottom: "1px solid var(--tb-line)" }}

        <div className="flex items-center justify-between mb-3">
          <h1 className="tb-stencil text-3xl" style={{ color: "var(--tb-text)" }}>
            EPIC FISHY
          </h1>
          <button
            onClick={() => setShowSettings(true)}
            className="w-8 h-8 rounded-full flex items-center justify-center"
            style={{ background: "var(--tb-surface-2)", border: "2px solid var(--tb-brass-dim)" }}
          >
            <Settings size={14} style={{ color: "var(--tb-brass)" }} />
          </button>
        </div>

        {/* Tabs */}
        <div className="flex gap-2 overflow-x-auto tb-scroll" style={{ scrollbarWidth: "none" }}>
          <TabButton active={view === "tackle"} onClick={() => setView("tackle")} label="Tackle" />
          <TabButton active={view === "conditions"} onClick={() => setView("conditions")} label="Conditions" />
          <TabButton active={view === "catches"} onClick={() => setView("catches")} label="Catches" />
          <TabButton active={view === "spots"} onClick={() => setView("spots")} label="Spots" />
          <TabButton active={view === "community"} onClick={() => setView("community")} label="Community" />
          <TabButton active={view === "knots"} onClick={() => setView("knots")} label="Knots" />
        </div>

        {view === "tackle" && tackleSubView === "gear" && (
          <div className="mt-3 relative">
            <Search size={16} className="absolute left-3 top-1/2 -translate-y-1/2" style={{ color: "var(--tb-muted)" }} />
            <input
              value={search}
              onChange={(e) => setSearch(e.target.value)}
              placeholder="Search gear, size, or box..."
              className="w-full rounded-lg py-2.5 pl-9 pr-3 text-sm outline-none"
              style={{ background: "var(--tb-surface-2)", color: "var(--tb-text)", border: "1px solid var(--tb-line)" }}
            />
          </div>
        )}
      </div>

      {/* Body */}
      <div
        className="px-4 py-4 tb-scroll"
        style={{ maxHeight: "660px", overflowY: "auto" }}
        onTouchStart={handleTouchStart}
        onTouchEnd={handleTouchEnd}
      >
        {view === "tackle" && (
          <>
            <div className="flex gap-2 mb-3">
              <TabButton active={tackleSubView === "gear"} onClick={() => setTackleSubView("gear")} label="My Gear" />
              <TabButton active={tackleSubView === "guide"} onClick={() => setTackleSubView("guide")} label="ID Guide" />
            </div>

            {tackleSubView === "guide" && <TackleGuideView />}

            {tackleSubView === "gear" && (
              <>
                {loading && (
                  <div className="py-16 text-center" style={{ color: "var(--tb-muted)" }}>
                    Loading your gear...
                  </div>
                )}

                {!loading && filteredSearch && (
                  <div>
                    <p className="tb-mono text-xs mb-2" style={{ color: "var(--tb-muted)" }}>
                      {filteredSearch.length} result{filteredSearch.length !== 1 ? "s" : ""}
                    </p>
                    {filteredSearch.length === 0 ? (
                      <EmptyState text="No gear matches that search." />
                    ) : (
                      <div className="space-y-2">
                        {filteredSearch.map((item) => (
                          <ItemRow key={item.id} item={item} onAdjust={adjustQty} onEdit={() => { setEditingItem(item); setShowForm(true); }} onDelete={() => deleteItem(item.id)} />
                        ))}
                      </div>
                    )}
                  </div>
                )}

                {!loading && !filteredSearch && (
                  <div className="grid grid-cols-2 gap-3">
                    {CATEGORIES.map((c) => {
                      const Icon = c.icon;
                      const count = counts[c.id] || 0;
                      const low = lowCounts[c.id] || 0;
                      return (
                        <button
                          key={c.id}
                          onClick={() => setActiveCategory(c.id)}
                          className="relative rounded-xl p-4 text-left transition-transform active:scale-95"
                          style={{ background: "var(--tb-surface)", border: "1px solid var(--tb-line)" }}
                        >
                          {low > 0 && (
                            <div className="absolute -top-1.5 -right-1.5 rounded-full w-5 h-5 flex items-center justify-center tb-mono text-[10px] font-bold" style={{ background: "var(--tb-flare)", color: "var(--tb-bg)" }}>
                              {low}
                            </div>
                          )}
                          <Icon size={22} style={{ color: "var(--tb-brass)" }} />
                          <div className="mt-3 text-sm font-semibold" style={{ color: "var(--tb-text)" }}>{c.label}</div>
                          <div className="tb-mono text-xs mt-0.5" style={{ color: "var(--tb-muted)" }}>{count} item{count !== 1 ? "s" : ""}</div>
                        </button>
                      );
                    })}
                  </div>
                )}
              </>
            )}
          </>
        )}

        {view === "conditions" && <ConditionsView items={items || []} onQuickAdd={openQuickAdd} />}

        {view === "catches" && (
          <CatchesView
            catches={catches}
            items={items || []}
            onEdit={(c) => { setEditingCatch(c); setShowCatchForm(true); }}
            onDelete={deleteCatch}
          />
        )}

        {view === "spots" && <SpotsView catches={catches || []} />}

        {view === "community" && <CommunityView />}

        {view === "knots" && <KnotsView />}
      </div>

      {/* Add button */}
      {view === "tackle" && tackleSubView === "gear" && (
        <button
          onClick={() => { setEditingItem(null); setShowForm(true); }}
          className="absolute bottom-5 right-5 w-14 h-14 rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform"
          style={{ background: "var(--tb-brass)", color: "var(--tb-bg)" }}
        >
          <Plus size={26} />
        </button>
      )}
      {view === "catches" && (
        <button
          onClick={() => { setEditingCatch(null); setShowCatchForm(true); }}
          className="absolute bottom-5 right-5 w-14 h-14 rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform"
          style={{ background: "var(--tb-brass)", color: "var(--tb-bg)" }}
        >
          <Plus size={26} />

      )}

      {/* Toast */}

        <div className="tb-toast absolute bottom-24 left-1/2 -translate-x-1/2 px-4 py-2 rounded-full text-xs tb-mono" style={{ background: "var(--tb-surface-2)", color: "var(--tb-text)", border: "1px solid var(--tb-line)" }}>

      )}

      {saveError && (
        <div className="absolute top-2 left-1/2 -translate-x-1/2 px-3 py-1 rounded-full text-[10px] tb-mono" style={{ background: "var(--tb-flare)", color: "var(--tb-bg)" }}>
          couldn't save — check connection
        </div>
      )}

      {/* Category tray */}
      {activeCategory && !showForm && view === "tackle" && (
        <div className="tb-overlay absolute inset-0 z-20" style={{ background: "rgba(10,16,19,0.55)" }} onClick={() => setActiveCategory(null)}>
          <div className="tb-tray absolute bottom-0 left-0 right-0 rounded-t-2xl px-4 pt-3 pb-5" style={{ background: "var(--tb-bg)", border: "1px solid var(--tb-line)", maxHeight: "82%", display: "flex", flexDirection: "column" }} onClick={(e) => e.stopPropagation()}>
            <div className="w-10 h-1 rounded-full mx-auto mb-3" style={{ background: "var(--tb-line)" }} />

              <button onClick={() => setActiveCategory(null)}>
                <ChevronLeft size={20} style={{ color: "var(--tb-muted)" }} />

              <h2 className="tb-stencil text-xl" style={{ color: "var(--tb-text)" }}>
                {CATEGORIES.find((c) => c.id === activeCategory)?.label.toUpperCase()}

            </div>
            <div className="tb-scroll overflow-y-auto space-y-2 pb-2">
              {activeItems.length === 0 ? (
                <EmptyState text="This compartment is empty. Add your first item." />

                activeItems.map((item) => (
                  <ItemRow key={item.id} item={item} onAdjust={adjustQty} onEdit={() => { setEditingItem(item); setShowForm(true); }} onDelete={() => deleteItem(item.id)} />

        </div>
      )}

      {/* Add/Edit form */}
      {showForm && (
        <ItemForm initial={editingItem || formPrefill} defaultCategory={activeCategory} onCancel={() => { setShowForm(false); setEditingItem(null); setFormPrefill(null); }} onSave={upsertItem} />
      )}

      {showCatchForm && (
        <CatchForm
          initial={editingCatch}
          items={items || []}
          existingTrips={[...new Set((catches || []).map((c) => c.tripName).filter(Boolean))]}
          onCancel={() => { setShowCatchForm(false); setEditingCatch(null); }}
          onSave={upsertCatch}
        />

      {showSettings && <SettingsPanel onClose={() => setShowSettings(false)} />}
    </div>

function TabButton({ active, onClick, label }) {
  return (
    <button
      onClick={onClick}
      className="px-4 py-1.5 rounded-full text-xs font-semibold tb-mono transition-colors shrink-0"
      style={{
        background: active ? "var(--tb-brass)" : "var(--tb-surface-2)",
        color: active ? "var(--tb-bg)" : "var(--tb-muted)",
        border: "1px solid " + (active ? "var(--tb-brass)" : "var(--tb-line)"),
      }}
    >
      {label.toUpperCase()}
    </button>
  );
}

function EmptyState({ text }) {
  return (
    <div className="rounded-xl py-10 text-center text-sm" style={{ background: "var(--tb-surface)", color: "var(--tb-muted)", border: "1px dashed var(--tb-line)" }}>
      {text}
    </div>
  );
}

function isMaintenanceDue(item) {
  if (!item.lastServiced || !item.serviceIntervalDays) return false;
  const last = new Date(item.lastServiced);
  const dueDate = new Date(last.getTime() + item.serviceIntervalDays * 86400000);
  return new Date() >= dueDate;
}

function ItemRow({ item, onAdjust, onEdit, onDelete }) {
  const low = item.quantity <= (item.lowThreshold ?? 2);
  const serviceDue = isMaintenanceDue(item);
  const [showPhoto, setShowPhoto] = useState(false);
  const CategoryIcon = CATEGORIES.find((c) => c.id === item.category)?.icon || Package;
  return (
    <div className="rounded-xl p-3 flex items-center gap-3" style={{ background: "var(--tb-surface)", border: "1px solid var(--tb-line)" }}>
      {item.photo ? (
        <img
          src={item.photo}
          alt=""
          onClick={() => setShowPhoto(true)}
          className="w-11 h-11 rounded-lg object-cover shrink-0"
          style={{ border: "1px solid var(--tb-line)" }}
        />
      ) : (
        <div className="w-11 h-11 rounded-lg flex items-center justify-center shrink-0" style={{ background: "var(--tb-surface-2)" }}>
          <CategoryIcon size={18} style={{ color: "var(--tb-brass)" }} />
        </div>
      )}
      <div className="flex-1 min-w-0" onClick={onEdit}>
        <div className="flex items-center gap-1.5">
          <span className="text-sm font-semibold truncate" style={{ color: "var(--tb-text)" }}>{item.name}</span>
          {low && <AlertTriangle size={12} style={{ color: "var(--tb-flare)" }} />}
          {serviceDue && <Wrench size={12} style={{ color: "var(--tb-flare)" }} />}
        </div>
        <div className="tb-mono text-[11px] mt-0.5 truncate" style={{ color: "var(--tb-muted)" }}>
          {[item.spec, item.location, item.condition].filter(Boolean).join(" · ")}
        </div>
        {serviceDue && (
          <div className="tb-mono text-[10px] mt-0.5" style={{ color: "var(--tb-flare)" }}>Service due</div>
        )}
      </div>
      <div className="flex items-center gap-1.5 shrink-0">
        <button onClick={() => onAdjust(item.id, -1)} className="w-7 h-7 rounded-md flex items-center justify-center" style={{ background: "var(--tb-surface-2)", color: "var(--tb-text)" }}>
          <Minus size={13} />
        </button>
        <span className="tb-mono text-sm w-6 text-center" style={{ color: "var(--tb-text)" }}>{item.quantity}</span>
        <button onClick={() => onAdjust(item.id, 1)} className="w-7 h-7 rounded-md flex items-center justify-center" style={{ background: "var(--tb-surface-2)", color: "var(--tb-text)" }}>
          <Plus size={13} />
        </button>
        <button onClick={onDelete} className="w-7 h-7 rounded-md flex items-center justify-center ml-0.5" style={{ color: "var(--tb-flare)" }}>
          <Trash2 size={14} />
        </button>
      </div>
      {showPhoto && item.photo && <PhotoLightbox src={item.photo} onClose={() => setShowPhoto(false)} />}
    </div>
  );
}

function ItemForm({ initial, defaultCategory, onCancel, onSave }) {
  const [name, setName] = useState(initial?.name || "");
  const [category, setCategory] = useState(initial?.category || defaultCategory || "lures");
  const [spec, setSpec] = useState(initial?.spec || "");
  const [quantity, setQuantity] = useState(initial?.quantity ?? 1);
  const [lowThreshold, setLowThreshold] = useState(initial?.lowThreshold ?? 2);
  const [location, setLocation] = useState(initial?.location || "");
  const [condition, setCondition] = useState(initial?.condition || CONDITIONS[0]);
  const [notes, setNotes] = useState(initial?.notes || "");
  const [photo, setPhoto] = useState(initial?.photo || null);
  const [lastServiced, setLastServiced] = useState(initial?.lastServiced ? initial.lastServiced.slice(0, 10) : "");
  const [serviceIntervalDays, setServiceIntervalDays] = useState(initial?.serviceIntervalDays || "");

  function submit() {
    if (!name.trim()) return;
    onSave({
      id: initial?.id || uid(),
      name: name.trim(),
      category,
      spec: spec.trim(),
      quantity: Number(quantity) || 0,
      lowThreshold: Number(lowThreshold) || 0,
      location: location.trim(),
      condition,
      notes: notes.trim(),
      photo,
      lastServiced: lastServiced ? new Date(lastServiced).toISOString() : null,
      serviceIntervalDays: serviceIntervalDays === "" ? null : Number(serviceIntervalDays),
    });
  }

  const inputStyle = { background: "var(--tb-surface-2)", color: "var(--tb-text)", border: "1px solid var(--tb-line)" };

  return (
    <div className="tb-overlay absolute inset-0 z-30" style={{ background: "rgba(10,16,19,0.65)" }}>
      <div className="tb-tray absolute bottom-0 left-0 right-0 rounded-t-2xl px-5 pt-4 pb-6" style={{ background: "var(--tb-bg)", border: "1px solid var(--tb-line)", maxHeight: "90%", overflowY: "auto" }}>
        <div className="flex items-center justify-between mb-4">
          <h2 className="tb-stencil text-xl" style={{ color: "var(--tb-text)" }}>{initial ? "EDIT ITEM" : "ADD ITEM"}</h2>
          <button onClick={onCancel}><X size={20} style={{ color: "var(--tb-muted)" }} /></button>
        </div>

        <div className="space-y-3">
          <Field label="Name">
            <input autoFocus value={name} onChange={(e) => setName(e.target.value)} placeholder="e.g. Texas Rig Worm Hooks" className="w-full rounded-lg py-2 px-3 text-sm outline-none" style={inputStyle} />
          </Field>
          <PhotoField photo={photo} onChange={setPhoto} />
          <Field label="Compartment">
            <select value={category} onChange={(e) => setCategory(e.target.value)} className="w-full rounded-lg py-2 px-3 text-sm outline-none" style={inputStyle}>
              {CATEGORIES.map((c) => <option key={c.id} value={c.id}>{c.label}</option>)}
            </select>
          </Field>
          <div className="grid grid-cols-2 gap-3">
            <Field label="Size / spec">
              <input value={spec} onChange={(e) => setSpec(e.target.value)} placeholder="4/0, 10lb mono..." className="w-full rounded-lg py-2 px-3 text-sm outline-none" style={inputStyle} />
            </Field>
            <Field label="Box / bag">
              <input value={location} onChange={(e) => setLocation(e.target.value)} placeholder="Box 1, top tray" className="w-full rounded-lg py-2 px-3 text-sm outline-none" style={inputStyle} />
            </Field>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <Field label="Quantity">
              <input type="number" min="0" value={quantity} onChange={(e) => setQuantity(e.target.value)} className="w-full rounded-lg py-2 px-3 text-sm outline-none tb-mono" style={inputStyle} />
            </Field>
            <Field label="Low-stock alert at">
              <input type="number" min="0" value={lowThreshold} onChange={(e) => setLowThreshold(e.target.value)} className="w-full rounded-lg py-2 px-3 text-sm outline-none tb-mono" style={inputStyle} />
            </Field>
          </div>
          <Field label="Condition">
            <select value={condition} onChange={(e) => setCondition(e.target.value)} className="w-full rounded-lg py-2 px-3 text-sm outline-none" style={inputStyle}>
              {CONDITIONS.map((c) => <option key={c} value={c}>{c}</option>)}
            </select>
          </Field>
          <div className="grid grid-cols-2 gap-3">
            <Field label="Last serviced">
              <input type="date" value={lastServiced} onChange={(e) => setLastServiced(e.target.value)} className="w-full rounded-lg py-2 px-3 text-sm outline-none" style={inputStyle} />
            </Field>
            <Field label="Service every (days)">
              <input type="number" min="0" value={serviceIntervalDays} onChange={(e) => setServiceIntervalDays(e.target.value)} placeholder="e.g. 90" className="w-full rounded-lg py-2 px-3 text-sm outline-none tb-mono" style={inputStyle} />
            </Field>
          </div>
          <button
            type="button"
            onClick={() => setLastServiced(new Date().toISOString().slice(0, 10))}
            className="text-xs tb-mono"
            style={{ color: "var(--tb-blue)" }}
          >
            Mark serviced today
          </button>
          <Field label="Notes (optional)">
            <textarea value={notes} onChange={(e) => setNotes(e.target.value)} rows={2} placeholder="Anything worth remembering..." className="w-full rounded-lg py-2 px-3 text-sm outline-none resize-none" style={inputStyle} />
          </Field>
        </div>

        <div className="flex gap-3 mt-5">
          <button onClick={onCancel} className="flex-1 py-2.5 rounded-lg text-sm font-semibold" style={{ background: "var(--tb-surface-2)", color: "var(--tb-text)" }}>Cancel</button>
          <button onClick={submit} disabled={!name.trim()} className="flex-1 py-2.5 rounded-lg text-sm font-semibold" style={{ background: name.trim() ? "var(--tb-brass)" : "var(--tb-surface-2)", color: name.trim() ? "var(--tb-bg)" : "var(--tb-muted)" }}>
            {initial ? "Save changes" : "Add to box"}
          </button>
        </div>
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <label className="block">
      <span className="tb-mono text-[11px] block mb-1" style={{ color: "var(--tb-muted)" }}>{label}</span>
      {children}
    </label>
  );
}

function PhotoField({ photo, onChange, label = "Photo" }) {
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);
  const inputRef = useRef(null);

  async function handleFile(e) {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    setBusy(true);
    setError(null);
    try {
      const dataUrl = await compressImage(file);
      onChange(dataUrl);
    } catch (err) {
      setError("Couldn't process that photo — try another.");
    } finally {
      setBusy(false);
    }
  }

  return (
    <Field label={label}>
      <input ref={inputRef} type="file" accept="image/*" onChange={handleFile} className="hidden" />
      {busy ? (
        <div className="flex items-center gap-2 text-xs tb-mono rounded-lg py-2 px-3" style={{ background: "var(--tb-surface-2)", border: "1px solid var(--tb-line)" }}>
          <RefreshCw size={13} className="tb-spin" style={{ color: "var(--tb-muted)" }} />
          <span style={{ color: "var(--tb-muted)" }}>Processing photo...</span>
        </div>
      ) : photo ? (
        <div className="flex items-center gap-3">
          <img src={photo} alt="" className="w-16 h-16 rounded-lg object-cover" style={{ border: "1px solid var(--tb-line)" }} />
          <div className="flex flex-col gap-1.5">
            <button type="button" onClick={() => inputRef.current && inputRef.current.click()} className="text-xs tb-mono text-left" style={{ color: "var(--tb-blue)" }}>
              Replace photo
            </button>
            <button type="button" onClick={() => onChange(null)} className="text-xs tb-mono text-left" style={{ color: "var(--tb-flare)" }}>
              Remove photo
            </button>
          </div>
        </div>
      ) : (
        <button
          type="button"
          onClick={() => inputRef.current && inputRef.current.click()}
          className="w-full py-2 rounded-lg text-xs tb-mono flex items-center justify-center gap-1.5"
          style={{ background: "var(--tb-surface-2)", color: "var(--tb-text)", border: "1px solid var(--tb-line)" }}
        >
          <Camera size={14} style={{ color: "var(--tb-brass)" }} />
          Take or choose a photo
        </button>
      )}
      {error && <div className="tb-mono text-[10px] mt-1" style={{ color: "var(--tb-flare)" }}>{error}</div>}
    </Field>
  );
}

function PhotoLightbox({ src, onClose }) {
  return (
    <div
      className="tb-overlay absolute inset-0 z-40 flex items-center justify-center p-6"
      style={{ background: "rgba(10,16,19,0.9)" }}
      onClick={onClose}
    >
      <button onClick={onClose} className="absolute top-4 right-4 w-8 h-8 rounded-full flex items-center justify-center" style={{ background: "var(--tb-surface-2)" }}>
        <X size={18} style={{ color: "var(--tb-text)" }} />
      </button>
      <img src={src} alt="" className="max-w-full max-h-full rounded-xl" style={{ border: "1px solid var(--tb-line)" }} onClick={(e) => e.stopPropagation()} />
    </div>
  );
}

/* ---------------- Catch log ---------------- */

function groupCatchesByTrip(sortedCatches) {
  const groups = {};
  for (const c of sortedCatches) {
    const key = c.tripName && c.tripName.trim() ? c.tripName.trim() : "Ungrouped catches";
    if (!groups[key]) groups[key] = [];
    groups[key].push(c);
  }
  return Object.entries(groups)
    .map(([tripName, list]) => {
      const bestC = list.reduce((best, c) => {
        const lb = weightToLb(c.weight, c.weightUnit);
        return !best || lb > weightToLb(best.weight, best.weightUnit) ? c : best;
      }, null);
      return { tripName, catches: list, bestC };
    })
    .sort((a, b) => {
      if (a.tripName === "Ungrouped catches") return 1;
      if (b.tripName === "Ungrouped catches") return -1;
      return new Date(b.catches[0].dateTime) - new Date(a.catches[0].dateTime);
    });
}

function CatchesView({ catches, items, onEdit, onDelete }) {
  const [groupByTrip, setGroupByTrip] = useState(false);

  if (catches === null) {
    return <div className="py-16 text-center" style={{ color: "var(--tb-muted)" }}>Loading your catch log...</div>;
  }

  if (catches.length === 0) {
    return (
      <div className="py-10 text-center space-y-3">
        <Fish size={32} className="mx-auto" style={{ color: "var(--tb-brass)" }} />
        <p className="text-sm" style={{ color: "var(--tb-muted)" }}>
          No catches logged yet. Tap + to record your first fish.
        </p>
      </div>
    );
  }

  const sorted = [...catches].sort((a, b) => new Date(b.dateTime) - new Date(a.dateTime));
  const bestWeight = catches.reduce((best, c) => {
    const lb = weightToLb(c.weight, c.weightUnit);
    return lb > best.lb ? { lb, c } : best;
  }, { lb: 0, c: null });
  const bestLength = catches.reduce((best, c) => {
    const inches = lengthToIn(c.length, c.lengthUnit);
    return inches > best.inches ? { inches, c } : best;
  }, { inches: 0, c: null });

  const speciesCounts = {};
  for (const c of catches) {
    if (c.species) speciesCounts[c.species] = (speciesCounts[c.species] || 0) + 1;
  }
  const topSpecies = Object.entries(speciesCounts).sort((a, b) => b[1] - a[1])[0];
  const trips = groupByTrip ? groupCatchesByTrip(sorted) : null;

  return (
    <div className="space-y-3">
      <div className="grid grid-cols-3 gap-2">
        <StatTile label="Total" value={catches.length} />
        <StatTile label="Top species" value={topSpecies ? topSpecies[0] : "—"} small />
        <StatTile
          label="Personal best"
          value={bestWeight.c ? `${bestWeight.c.weight} ${bestWeight.c.weightUnit}` : "—"}
          icon={Trophy}
          small
        />
      </div>

      <div className="flex justify-end">
        <button
          onClick={() => setGroupByTrip((v) => !v)}
          className="text-xs tb-mono px-3 py-1.5 rounded-full"
          style={{ background: groupByTrip ? "var(--tb-brass)" : "var(--tb-surface-2)", color: groupByTrip ? "var(--tb-bg)" : "var(--tb-text)", border: "1px solid var(--tb-line)" }}
        >
          {groupByTrip ? "Ungroup" : "Group by trip"}
        </button>
      </div>

      {!groupByTrip && (
        <div className="space-y-2">
          {sorted.map((c) => (
            <CatchRow key={c.id} record={c} onEdit={() => onEdit(c)} onDelete={() => onDelete(c.id)} />
          ))}
        </div>
      )}

      {groupByTrip && (
        <div className="space-y-4">
          {trips.map((t) => (
            <div key={t.tripName}>
              <div className="flex items-center justify-between mb-1.5 px-1">
                <span className="text-sm font-semibold" style={{ color: "var(--tb-text)" }}>{t.tripName}</span>
                <span className="tb-mono text-[11px]" style={{ color: "var(--tb-muted)" }}>
                  {t.catches.length} catch{t.catches.length !== 1 ? "es" : ""}
                  {t.bestC && t.bestC.weight ? ` · best ${t.bestC.weight} ${t.bestC.weightUnit}` : ""}
                </span>
              </div>
              <div className="space-y-2">
                {t.catches.map((c) => (
                  <CatchRow key={c.id} record={c} onEdit={() => onEdit(c)} onDelete={() => onDelete(c.id)} />
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function toDatetimeLocal(d) {
  const pad = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function CatchForm({ initial, items, existingTrips = [], onCancel, onSave }) {
  const [species, setSpecies] = useState(initial?.species || "");
  const [length, setLength] = useState(initial?.length || "");
  const [lengthUnit, setLengthUnit] = useState(initial?.lengthUnit || "in");
  const [weight, setWeight] = useState(initial?.weight || "");
  const [weightUnit, setWeightUnit] = useState(initial?.weightUnit || "lb");
  const [dateTime, setDateTime] = useState(initial?.dateTime ? initial.dateTime.slice(0, 16) : toDatetimeLocal(new Date()));
  const [location, setLocation] = useState(initial?.location || "");
  const [tripName, setTripName] = useState(initial?.tripName || "");
  const [lure, setLure] = useState(initial?.lure || "");
  const [notes, setNotes] = useState(initial?.notes || "");
  const [gps, setGps] = useState(initial?.gps || null);
  const [gpsStatus, setGpsStatus] = useState(initial?.gps ? "ok" : "idle"); // idle | locating | ok | error
  const [photo, setPhoto] = useState(initial?.photo || null);
  const [shareToCommunity, setShareToCommunity] = useState(false);
  const communityAvailable = typeof window !== "undefined" && window.communityAPI && window.communityAPI.configured;

  const captureGps = useCallback(() => {
    if (!navigator.geolocation) {
      setGpsStatus("error");
      return;
    }
    setGpsStatus("locating");
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        setGps({ lat: pos.coords.latitude, lon: pos.coords.longitude, accuracy: pos.coords.accuracy });
        setGpsStatus("ok");
      },
      () => setGpsStatus("error"),
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }, []);

  useEffect(() => {
    // Only auto-tag brand new catches — edits keep whatever was saved unless the angler retags.
    if (!initial) captureGps();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  function submit() {
    if (!species.trim()) return;
    onSave({
      id: initial?.id || uid(),
      species: species.trim(),
      length: length === "" ? null : Number(length),
      lengthUnit,
      weight: weight === "" ? null : Number(weight),
      weightUnit,
      dateTime: new Date(dateTime).toISOString(),
      location: location.trim(),
      tripName: tripName.trim(),
      lure: lure.trim(),
      notes: notes.trim(),
      gps,
      photo,
    });
    if (shareToCommunity && communityAvailable && window.communityAPI.ready) {
      window.communityAPI.addCatch({
        species: species.trim(),
        length: length === "" ? null : Number(length),
        lengthUnit,
        weight: weight === "" ? null : Number(weight),
        weightUnit,
        dateTime: new Date(dateTime).toISOString(),
        location: location.trim(),
        lure: lure.trim(),
      }).catch(() => {});
    }
  }

  const inputStyle = { background: "var(--tb-surface-2)", color: "var(--tb-text)", border: "1px solid var(--tb-line)" };

  return (
    <div className="tb-overlay absolute inset-0 z-30" style={{ background: "rgba(10,16,19,0.65)" }}>
      <div className="tb-tray absolute bottom-0 left-0 right-0 rounded-t-2xl px-5 pt-4 pb-6" style={{ background: "var(--tb-bg)", border: "1px solid var(--tb-line)", maxHeight: "90%", overflowY: "auto" }}>
        <div className="flex items-center justify-between mb-4">
          <h2 className="tb-stencil text-xl" style={{ color: "var(--tb-text)" }}>{initial ? "EDIT CATCH" : "LOG A CATCH"}</h2>
          <button onClick={onCancel}><X size={20} style={{ color: "var(--tb-muted)" }} /></button>
        </div>

        <div className="space-y-3">
          <Field label="Species">
            <input autoFocus value={species} onChange={(e) => setSpecies(e.target.value)} placeholder="e.g. Largemouth bass" className="w-full rounded-lg py-2 px-3 text-sm outline-none" style={inputStyle} />
          </Field>

          <PhotoField photo={photo} onChange={setPhoto} label="Catch photo" />

          <div className="grid grid-cols-2 gap-3">
            <Field label="Length">
              <div className="flex gap-1.5">
                <input type="number" min="0" step="0.1" value={length} onChange={(e) => setLength(e.target.value)} className="w-full rounded-lg py-2 px-3 text-sm outline-none tb-mono" style={inputStyle} />
                <select value={lengthUnit} onChange={(e) => setLengthUnit(e.target.value)} className="rounded-lg px-2 text-sm outline-none" style={inputStyle}>
                  <option value="in">in</option>
                  <option value="cm">cm</option>
                </select>
              </div>
            </Field>
            <Field label="Weight">
              <div className="flex gap-1.5">
                <input type="number" min="0" step="0.1" value={weight} onChange={(e) => setWeight(e.target.value)} className="w-full rounded-lg py-2 px-3 text-sm outline-none tb-mono" style={inputStyle} />
                <select value={weightUnit} onChange={(e) => setWeightUnit(e.target.value)} className="rounded-lg px-2 text-sm outline-none" style={inputStyle}>
                  <option value="lb">lb</option>
                  <option value="kg">kg</option>
                </select>
              </div>
            </Field>
          </div>

          <Field label="Date & time">
            <input type="datetime-local" value={dateTime} onChange={(e) => setDateTime(e.target.value)} className="w-full rounded-lg py-2 px-3 text-sm outline-none tb-mono" style={inputStyle} />
          </Field>

          <Field label="Location">
            <input value={location} onChange={(e) => setLocation(e.target.value)} placeholder="Lake, river, or spot name" className="w-full rounded-lg py-2 px-3 text-sm outline-none" style={inputStyle} />
          </Field>

          <Field label="Trip (optional)">
            <input
              value={tripName}
              onChange={(e) => setTripName(e.target.value)}
              placeholder="e.g. Memorial Day weekend"
              list="trip-suggestions"
              className="w-full rounded-lg py-2 px-3 text-sm outline-none"
              style={inputStyle}
            />
            <datalist id="trip-suggestions">
              {existingTrips.map((t) => <option key={t} value={t} />)}
            </datalist>
          </Field>

          <Field label="GPS tag">
            {gpsStatus === "locating" && (
              <div className="flex items-center gap-2 text-xs tb-mono rounded-lg py-2 px-3" style={inputStyle}>
                <RefreshCw size={13} className="tb-spin" style={{ color: "var(--tb-muted)" }} />
                <span style={{ color: "var(--tb-muted)" }}>Finding your location...</span>
              </div>
            )}
            {gpsStatus === "ok" && gps && (
              <div className="flex items-center justify-between text-xs tb-mono rounded-lg py-2 px-3" style={inputStyle}>
                <span className="flex items-center gap-1.5" style={{ color: "var(--tb-text)" }}>
                  <MapPin size={13} style={{ color: "var(--tb-brass)" }} />
                  {gps.lat.toFixed(5)}, {gps.lon.toFixed(5)}
                  {typeof gps.accuracy === "number" && <span style={{ color: "var(--tb-muted)" }}> · ±{Math.round(gps.accuracy)}m</span>}
                </span>
                <span className="flex items-center gap-3">
                  <button type="button" onClick={captureGps} style={{ color: "var(--tb-blue)" }}>Retag</button>
                  <button type="button" onClick={() => { setGps(null); setGpsStatus("idle"); }} style={{ color: "var(--tb-flare)" }}>Remove</button>
                </span>
              </div>
            )}
            {gpsStatus === "error" && (
              <div className="flex items-center justify-between text-xs tb-mono rounded-lg py-2 px-3" style={inputStyle}>
                <span style={{ color: "var(--tb-muted)" }}>Couldn't get your location.</span>
                <button type="button" onClick={captureGps} style={{ color: "var(--tb-brass)" }}>Try again</button>
              </div>
            )}
            {gpsStatus === "idle" && (
              <button type="button" onClick={captureGps} className="w-full py-2 rounded-lg text-xs tb-mono flex items-center justify-center gap-1.5" style={inputStyle}>
                <MapPin size={13} style={{ color: "var(--tb-brass)" }} />
                Tag current GPS location
              </button>
            )}
          </Field>

          <Field label="Lure / bait used">
            <input
              value={lure}
              onChange={(e) => setLure(e.target.value)}
              placeholder="Pick from your tackle box or type your own"
              list="tb-lure-options"
              className="w-full rounded-lg py-2 px-3 text-sm outline-none"
              style={inputStyle}
            />
            <datalist id="tb-lure-options">
              {items.map((i) => <option key={i.id} value={i.name} />)}
            </datalist>
          </Field>

          <Field label="Notes (optional)">
            <textarea value={notes} onChange={(e) => setNotes(e.target.value)} rows={2} placeholder="Conditions, technique, anything worth remembering..." className="w-full rounded-lg py-2 px-3 text-sm outline-none resize-none" style={inputStyle} />
          </Field>

          {communityAvailable && (
            <label className="flex items-center gap-2.5 rounded-lg py-2.5 px-3" style={{ background: "var(--tb-surface-2)", border: "1px solid var(--tb-line)" }}>
              <input type="checkbox" checked={shareToCommunity} onChange={(e) => setShareToCommunity(e.target.checked)} className="w-4 h-4" />
              <span className="text-xs tb-mono" style={{ color: "var(--tb-text)" }}>
                Share to community feed <span style={{ color: "var(--tb-muted)" }}>(species, size, lure — no exact GPS or photo)</span>
              </span>
            </label>
          )}
        </div>

        <div className="flex gap-3 mt-5">
          <button onClick={onCancel} className="flex-1 py-2.5 rounded-lg text-sm font-semibold" style={{ background: "var(--tb-surface-2)", color: "var(--tb-text)" }}>Cancel</button>
          <button onClick={submit} disabled={!species.trim()} className="flex-1 py-2.5 rounded-lg text-sm font-semibold" style={{ background: species.trim() ? "var(--tb-brass)" : "var(--tb-surface-2)", color: species.trim() ? "var(--tb-bg)" : "var(--tb-muted)" }}>
            {initial ? "Save changes" : "Log catch"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ---------------- Conditions (weather / tide / radar) ---------------- */

function ConditionsView({ items = [], onQuickAdd }) {
  const [location, setLocation] = useState(null); // {name, lat, lon}
  const [locLoading, setLocLoading] = useState(true);
  const [showLocationPicker, setShowLocationPicker] = useState(false);

  const [weather, setWeather] = useState(null);
  const [weatherError, setWeatherError] = useState(null);
  const [weatherLoading, setWeatherLoading] = useState(false);

  const [tide, setTide] = useState(null);
  const [tideError, setTideError] = useState(null);
  const [tideLoading, setTideLoading] = useState(false);

  const [waterTemp, setWaterTemp] = useState(null); // null = not loaded/unavailable

  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get(LOCATION_KEY, false);
        if (res && res.value) setLocation(JSON.parse(res.value));
      } catch (e) {
        // no saved location yet
      }
      setLocLoading(false);
    })();
  }, []);

  const saveLocation = useCallback(async (loc) => {
    setLocation(loc);
    try {
      await window.storage.set(LOCATION_KEY, JSON.stringify(loc), false);
    } catch (e) {
      // ignore, will just not persist
    }
  }, []);

  const loadWaterTemp = useCallback(async (lat, lon) => {
    try {
      const url = `https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&current=sea_surface_temperature&temperature_unit=fahrenheit&timezone=auto`;
      const res = await fetch(url);
      if (!res.ok) throw new Error("marine request failed");
      const data = await res.json();
      const temp = data.current?.sea_surface_temperature;
      setWaterTemp(typeof temp === "number" ? temp : null);
    } catch (e) {
      setWaterTemp(null); // quietly unavailable (common for inland/freshwater spots)
    }
  }, []);

  const loadWeather = useCallback(async (lat, lon) => {
    setWeatherLoading(true);
    setWeatherError(null);
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,wind_speed_10m,wind_direction_10m,wind_gusts_10m,pressure_msl,cloud_cover,weather_code,precipitation&hourly=pressure_msl,precipitation_probability&daily=sunrise,sunset&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=auto&forecast_days=2`;
      const res = await fetch(url);
      if (!res.ok) throw new Error("weather request failed");
      const data = await res.json();
      setWeather(data);
    } catch (e) {
      setWeatherError("Couldn't load weather right now.");
    } finally {
      setWeatherLoading(false);
    }
  }, []);

  const loadTide = useCallback(async (lat, lon) => {
    setTideLoading(true);
    setTideError(null);
    setTide(null);
    try {
      const stationsRes = await fetch("https://api.tidesandcurrents.noaa.gov/mdapi/prod/webapi/stations.json?type=tidepredictions");
      if (!stationsRes.ok) throw new Error("station list failed");
      const stationsData = await stationsRes.json();
      let best = null;
      let bestDist = Infinity;
      for (const s of stationsData.stations || []) {
        const d = haversineMiles(lat, lon, s.lat, s.lng);
        if (d < bestDist) { bestDist = d; best = s; }
      }
      if (!best || bestDist > 60) {
        setTideError("No nearby tide station — this spot may be inland or too far from the coast.");
        return;
      }
      const today = new Date();
      const end = new Date(today);
      end.setDate(end.getDate() + 1);
      const fmt = (d) => `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, "0")}${String(d.getDate()).padStart(2, "0")}`;
      const predUrl = `https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?product=predictions&datum=MLLW&station=${best.id}&time_zone=lst_ldt&units=english&interval=hilo&format=json&begin_date=${fmt(today)}&end_date=${fmt(end)}`;
      const predRes = await fetch(predUrl);
      const predData = await predRes.json();
      if (predData.error) throw new Error(predData.error.message || "prediction error");
      setTide({ station: best, distance: bestDist, predictions: predData.predictions || [] });
    } catch (e) {
      setTideError("Couldn't load tide data right now.");
    } finally {
      setTideLoading(false);
    }
  }, []);

  useEffect(() => {
    if (!location) return;
    loadWeather(location.lat, location.lon);
    loadTide(location.lat, location.lon);
    loadWaterTemp(location.lat, location.lon);
  }, [location, loadWeather, loadTide, loadWaterTemp]);

  function useMyLocation() {
    setLocLoading(true);
    if (!navigator.geolocation) {
      setLocLoading(false);
      setShowLocationPicker(true);
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        saveLocation({ name: "Current location", lat: pos.coords.latitude, lon: pos.coords.longitude });
        setLocLoading(false);
      },
      () => {
        setLocLoading(false);
        setShowLocationPicker(true);
      },
      { timeout: 8000 }
    );
  }

  if (locLoading) {
    return <div className="py-16 text-center" style={{ color: "var(--tb-muted)" }}>Checking conditions...</div>;
  }

  if (!location) {
    return (
      <div className="py-8 text-center space-y-4">
        <Waves size={32} className="mx-auto" style={{ color: "var(--tb-brass)" }} />
        <p className="text-sm" style={{ color: "var(--tb-muted)" }}>
          Add a location to see weather, tides, and live radar for your spot.
        </p>
        <div className="flex flex-col gap-2 items-center">
          <button onClick={useMyLocation} className="px-4 py-2 rounded-lg text-sm font-semibold" style={{ background: "var(--tb-brass)", color: "var(--tb-bg)" }}>
            Use my location
          </button>
          <button onClick={() => setShowLocationPicker(true)} className="px-4 py-2 rounded-lg text-sm font-semibold" style={{ background: "var(--tb-surface-2)", color: "var(--tb-text)" }}>
            Search for a spot
          </button>
        </div>
        {showLocationPicker && <LocationPicker onPick={(loc) => { saveLocation(loc); setShowLocationPicker(false); }} onClose={() => setShowLocationPicker(false)} />}
      </div>
    );
  }

  return (
    <div className="space-y-3">
      <div className="flex items-center justify-between">
        <button onClick={() => setShowLocationPicker(true)} className="flex items-center gap-1.5 text-sm font-semibold" style={{ color: "var(--tb-text)" }}>
          <MapPin size={15} style={{ color: "var(--tb-brass)" }} />
          {location.name}
        </button>
        <button onClick={() => { loadWeather(location.lat, location.lon); loadTide(location.lat, location.lon); loadWaterTemp(location.lat, location.lon); }} className="w-7 h-7 rounded-md flex items-center justify-center" style={{ background: "var(--tb-surface-2)" }}>
          <RefreshCw size={13} className={weatherLoading || tideLoading ? "tb-spin" : ""} style={{ color: "var(--tb-muted)" }} />
        </button>
      </div>

      <WeatherCard weather={weather} loading={weatherLoading} error={weatherError} waterTemp={waterTemp} />
      <TideCard tide={tide} loading={tideLoading} error={tideError} />
      <BestBiteCard weather={weather} />
      <RecommendationCard weather={weather} tide={tide} items={items} onQuickAdd={onQuickAdd} />
      <RadarCard lat={location.lat} lon={location.lon} />

      {showLocationPicker && <LocationPicker onPick={(loc) => { saveLocation(loc); setShowLocationPicker(false); }} onClose={() => setShowLocationPicker(false)} onUseMyLocation={useMyLocation} />}
    </div>
  );
}

function WeatherCard({ weather, loading, error, waterTemp }) {
  if (loading) return <CardShell><span className="tb-mono text-xs" style={{ color: "var(--tb-muted)" }}>Loading weather...</span></CardShell>;
  if (error) return <CardShell><span className="tb-mono text-xs" style={{ color: "var(--tb-flare)" }}>{error}</span></CardShell>;
  if (!weather || !weather.current) return null;

  const cur = weather.current;
  const { label, Icon } = weatherCodeInfo(cur.weather_code);

  const trend = getPressureTrend(weather);

  const sunrise = weather.daily?.sunrise?.[0];
  const sunset = weather.daily?.sunset?.[0];
  const fmtTime = (iso) => iso ? new Date(iso).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" }) : "--";

  return (
    <CardShell title="WEATHER">
      <div className="flex items-center gap-3 mb-3">
        <Icon size={30} style={{ color: "var(--tb-brass)" }} />
        <div>
          <div className="text-2xl font-semibold tb-mono" style={{ color: "var(--tb-text)" }}>{Math.round(cur.temperature_2m)}°F</div>
          <div className="text-xs" style={{ color: "var(--tb-muted)" }}>{label} · feels {Math.round(cur.apparent_temperature)}°</div>
        </div>
      </div>
      <div className="grid grid-cols-2 gap-2 tb-mono text-xs">
        <StatRow icon={Wind} label="Wind" value={`${Math.round(cur.wind_speed_10m)} mph ${compassDir(cur.wind_direction_10m)}`} />
        <StatRow icon={Wind} label="Gusts" value={`${Math.round(cur.wind_gusts_10m)} mph`} />
        <StatRow icon={Gauge} label="Pressure" value={`${Math.round(cur.pressure_msl)} hPa${trend ? " · " + trend : ""}`} trendIcon={trend === "rising" ? TrendingUp : trend === "falling" ? TrendingDown : null} />
        <StatRow icon={Droplets} label="Precip" value={`${cur.precipitation ?? 0} in`} />
        <StatRow icon={Sunrise} label="Sunrise" value={fmtTime(sunrise)} />
        <StatRow icon={Sunset} label="Sunset" value={fmtTime(sunset)} />
        {typeof waterTemp === "number" && (
          <StatRow icon={Waves} label="Water" value={`${Math.round(waterTemp)}°F`} />
        )}
      </div>
    </CardShell>
  );
}

function BestBiteCard({ weather }) {
  if (!weather || !weather.daily?.sunrise?.[0]) return null;

  const now = new Date();
  const moon = getMoonPhase(now);
  const periods = getSolunarPeriods(weather.daily.sunrise[0], weather.daily.sunset[0], moon.ageDays);
  if (!periods) return null;

  const fmt = (d) => d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
  const isNowIn = (p) => now >= p.start && now <= p.end;
  const activeNow = [...periods.majors, ...periods.minors].some(isNowIn);

  // Fishing is traditionally considered best near new and full moons.
  const nearKeyPhase = moon.ageDays < 2 || moon.ageDays > 27.5 || (moon.ageDays > 13.3 && moon.ageDays < 16.3);
  const dayRating = nearKeyPhase ? "Great day" : "Fair day";

  return (
    <CardShell title="BEST BITE TIMES" subtitle="estimated solunar windows — not exact astronomy">
      <div className="flex items-center gap-3 mb-3">
        <span className="text-2xl">{moon.emoji}</span>
        <div>
          <div className="text-sm font-semibold" style={{ color: "var(--tb-text)" }}>{moon.name}</div>
          <div className="tb-mono text-[11px]" style={{ color: "var(--tb-muted)" }}>
            {moon.illumination}% lit · {dayRating}
            {activeNow && <span style={{ color: "var(--tb-brass)" }}> · active now</span>}
          </div>
        </div>
      </div>
      <div className="grid grid-cols-2 gap-2">
        <div>
          <div className="tb-mono text-[10px] mb-1" style={{ color: "var(--tb-brass)" }}>MAJOR (strongest)</div>
          {periods.majors.map((p, i) => (
            <div key={i} className="tb-mono text-xs" style={{ color: isNowIn(p) ? "var(--tb-brass)" : "var(--tb-text)" }}>
              {fmt(p.start)}–{fmt(p.end)}
            </div>
          ))}
        </div>
        <div>
          <div className="tb-mono text-[10px] mb-1" style={{ color: "var(--tb-blue)" }}>MINOR</div>
          {periods.minors.map((p, i) => (
            <div key={i} className="tb-mono text-xs" style={{ color: isNowIn(p) ? "var(--tb-brass)" : "var(--tb-text)" }}>
              {fmt(p.start)}–{fmt(p.end)}
            </div>
          ))}
        </div>
      </div>
    </CardShell>
  );
}

function StatRow({ icon: Icon, label, value, trendIcon: TrendIcon }) {
  return (
    <div className="flex items-center gap-1.5" style={{ color: "var(--tb-muted)" }}>
      <Icon size={13} style={{ color: "var(--tb-blue)" }} />
      <span>{label}:</span>
      <span style={{ color: "var(--tb-text)" }}>{value}</span>
      {TrendIcon && <TrendIcon size={12} style={{ color: "var(--tb-brass)" }} />}
    </div>
  );
}

function TideCard({ tide, loading, error }) {
  if (loading) return <CardShell><span className="tb-mono text-xs" style={{ color: "var(--tb-muted)" }}>Loading tides...</span></CardShell>;
  if (error) return <CardShell title="TIDES"><span className="tb-mono text-xs" style={{ color: "var(--tb-muted)" }}>{error}</span></CardShell>;
  if (!tide) return null;

  return (
    <CardShell title="TIDES" subtitle={`nearest station: ${tide.station.name} (${tide.distance.toFixed(1)} mi)`}>
      {tide.predictions.length === 0 ? (
        <span className="tb-mono text-xs" style={{ color: "var(--tb-muted)" }}>No predictions available.</span>
      ) : (
        <div className="space-y-1.5">
          {tide.predictions.map((p, idx) => {
            const isHigh = p.type === "H";
            const dt = new Date(p.t.replace(" ", "T"));
            return (
              <div key={idx} className="flex items-center justify-between tb-mono text-xs">
                <div className="flex items-center gap-1.5" style={{ color: "var(--tb-text)" }}>
                  <ArrowUp size={12} style={{ color: isHigh ? "var(--tb-blue)" : "var(--tb-brass)", transform: isHigh ? "none" : "rotate(180deg)" }} />
                  {isHigh ? "High" : "Low"}
                </div>
                <div style={{ color: "var(--tb-muted)" }}>
                  {dt.toLocaleString([], { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" })}
                </div>
                <div style={{ color: "var(--tb-text)" }}>{Number(p.v).toFixed(1)} ft</div>
              </div>
            );
          })}
        </div>
      )}
    </CardShell>
  );
}
